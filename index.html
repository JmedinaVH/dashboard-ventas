<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard Ventas · Comercial — Viajero Hostels</title>
<link rel="icon" type="image/png" href="favicon-32x32.png"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --coral:#F04B24;--coral-d:#C93A18;--coral-soft:#FEF0EC;--coral-mid:#fdddd6;
  --cream:#F4EFE9;--cm:#EDE5DA;--cd:#E0D5C8;--border:#DDD4CA;
  --dark:#1E100A;--mid:#6B3A28;--gris:#7A6E68;
  --ok:#15803d;--ok-bg:#dcfce7;--ok-light:#86efac;
  --warn:#854d0e;--warn-bg:#fef9c3;--warn-light:#fde047;
  --err:#dc2626;--err-bg:#fee2e2;--err-light:#fca5a5;
  --blue:#0369a1;--blue-bg:#e0f2fe;
  --surface:#fff;
  --r:12px;--rl:16px;
  --sh:0 2px 8px rgba(30,16,10,.06),0 4px 20px rgba(30,16,10,.07);
  --shm:0 6px 28px rgba(30,16,10,.11);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Outfit','Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;background:var(--cream);color:var(--dark);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--cd);border-radius:9px;}

/* ── HEADER — idéntico al loyalty ── */
header{background:var(--dark);padding:0 36px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.h-left{display:flex;align-items:center;gap:14px;}
.h-logo{height:34px;object-fit:contain;}
.h-sep{width:1px;height:28px;background:rgba(255,255,255,.15);}
.h-title{color:#fff;font-size:16px;font-weight:700;}
.h-sub{color:rgba(255,255,255,.38);font-size:10px;letter-spacing:.4px;margin-top:1px;}
.h-right{display:flex;align-items:center;gap:10px;}
.h-ts{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:4px 10px;display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.h-ts-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.3);}
.h-ts-val{font-size:11px;color:rgba(255,255,255,.6);}
.h-live{display:flex;align-items:center;gap:5px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);border-radius:99px;padding:4px 11px;font-size:9px;font-weight:700;color:#10b981;letter-spacing:.5px;text-transform:uppercase;}
.h-live .dot{width:5px;height:5px;border-radius:50%;background:#10b981;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5);}50%{box-shadow:0 0 0 4px rgba(16,185,129,0);}}
.btn-hub{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.6);font-size:11px;font-weight:600;text-decoration:none;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:5px 11px;transition:.18s;}
.btn-hub:hover{background:rgba(255,255,255,.13);color:#fff;}

/* ── FILTROS — barra coral igual que loyalty ── */
.filtros{background:var(--coral);padding:9px 36px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;position:sticky;top:64px;z-index:199;border-bottom:2px solid var(--coral-d);}
.fg{display:flex;align-items:center;gap:8px;}
.fg label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.55);}
.fg select{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;padding:5px 10px;border:1.5px solid rgba(255,255,255,.22);border-radius:7px;background:rgba(255,255,255,.1);color:#fff;cursor:pointer;transition:.14s;-webkit-appearance:none;appearance:none;}
.fg select option{background:var(--dark);color:#fff;}
.fg select:focus{outline:none;background:rgba(255,255,255,.18);}

/* ── TABS — igual que loyalty: línea inferior, no pestañas ── */
.tabs-bar{background:var(--surface);border-bottom:2px solid var(--border);padding:0 36px;position:sticky;top:111px;z-index:198;display:flex;overflow-x:auto;}
.tab-btn{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:var(--gris);background:none;border:none;border-bottom:3px solid transparent;padding:13px 20px;cursor:pointer;transition:.16s;margin-bottom:-2px;white-space:nowrap;}
.tab-btn:hover{color:var(--dark);}
.tab-btn.active{color:var(--coral);border-bottom-color:var(--coral);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* ── MAIN ── */
main{max-width:1200px;margin:0 auto;padding:24px 36px 80px;}

/* ── SEC ── */
.sec{margin-bottom:24px;}
.sec-hdr{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
.sec-hdr h2{font-size:11px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
.sec-hdr .linea{flex:1;height:1px;background:var(--border);}

/* ── KPI BOXES ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.kpi-box{background:var(--surface);border-radius:var(--r);padding:20px 20px 18px;border:1.5px solid var(--border);position:relative;overflow:hidden;transition:box-shadow .18s;}
.kpi-box:hover{box-shadow:var(--shm);}
.kpi-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,var(--coral));border-radius:var(--r) var(--r) 0 0;}
.kpi-label{font-size:9px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;}
.kpi-val{font-size:28px;font-weight:800;line-height:1;color:var(--dark);margin-bottom:4px;}
.kpi-sub{font-size:11px;color:var(--gris);line-height:1.4;font-weight:500;}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 8px;border-radius:99px;}
.b-ok{background:var(--ok-bg);color:var(--ok);}
.b-warn{background:var(--warn-bg);color:var(--warn);}
.b-err{background:var(--err-bg);color:var(--err);}
.b-blue{background:var(--blue-bg);color:var(--blue);}

/* ── SEMÁFORO GRID — tarjetas de país ── */
.semaforo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:20px;align-items:start;}
.pais-card{background:var(--surface);border-radius:var(--rl);padding:18px 20px;border:1.5px solid var(--border);position:relative;overflow:hidden;transition:box-shadow .18s;}
.pais-card:hover{box-shadow:var(--shm);}
.pais-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--pc,var(--gris));border-radius:var(--rl) var(--rl) 0 0;}
.pc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.pc-nombre{font-weight:800;font-size:14px;}
.pc-cifras{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;margin-bottom:14px;}
.cf-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#B5ACA6;margin-bottom:1px;}
.cf-val{font-size:15px;font-weight:800;color:var(--dark);}
.cf-val.coral{color:var(--coral-d);}
.cf-val.green{color:var(--ok);}
.cf-val.red{color:var(--err);}
.bar-track{height:7px;border-radius:99px;background:var(--cd);overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.bar-meta{display:flex;justify-content:space-between;font-size:10px;font-weight:600;margin-top:4px;color:var(--gris);}

/* ── BAR CHART VERTICAL ── */
.chart-wrap{background:var(--surface);border-radius:var(--rl);border:1.5px solid var(--border);padding:20px 22px 16px;overflow-x:auto;}
.chart-title{font-size:9px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin-bottom:18px;}
.vbar-area{display:flex;gap:8px;align-items:flex-end;padding-bottom:0;position:relative;border-bottom:2px solid var(--border);min-height:200px;}
.vbar-group{display:flex;flex-direction:column;align-items:center;flex:1;min-width:40px;}
.vbar-sticks{display:flex;gap:3px;align-items:flex-end;height:180px;justify-content:center;}
.vbar-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative;}
.vbar{min-width:12px;border-radius:4px 4px 0 0;min-height:3px;cursor:pointer;transition:filter .16s,opacity .16s;position:relative;}
.vbar:hover{filter:brightness(1.12);}

.vbar.b-real{background:var(--coral);}
.vbar.b-obj{background:#27ae60;}
.vbar.b-ant{background:var(--cd);}
.vbar-lbl{font-size:10px;font-weight:700;text-align:center;margin-top:8px;color:var(--dark);line-height:1.2;max-width:90px;word-break:break-word;padding:0 2px;}
.chart-legend{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--gris);}
.leg-dot{width:12px;height:8px;border-radius:3px;flex-shrink:0;}
/* DONUT */
.donut-wrap{background:var(--surface);border-radius:var(--rl);border:1.5px solid var(--border);padding:20px 24px;margin-bottom:16px;}
.donut-title{font-size:9px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}
.donut-inner{display:flex;gap:24px;align-items:center;}
.donut-legend{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px 16px;}
.dl-item{display:flex;align-items:center;gap:8px;font-size:11px;}
.dl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dl-name{flex:1;font-weight:600;color:var(--dark);}
.dl-pct{font-weight:800;font-size:13px;min-width:38px;text-align:right;}
.dl-val{font-size:10px;color:var(--gris);min-width:52px;text-align:right;}

/* ── DETAIL TABLE ── */
.table-wrap{overflow-x:auto;border-radius:var(--r);border:1.5px solid var(--border);}
.detail-table{width:100%;border-collapse:collapse;font-size:12px;}
.detail-table thead th{background:var(--dark);color:rgba(255,255,255,.65);padding:10px 14px;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--dark);text-align:right;white-space:nowrap;}
.detail-table thead th:first-child{text-align:left;}
.detail-table tbody td{padding:11px 14px;border-bottom:1px solid var(--border);text-align:right;background:var(--surface);}
.detail-table tbody td:first-child{text-align:left;}
.detail-table tbody tr:nth-child(even) td{background:var(--cream);}
.detail-table tbody tr:hover td{background:var(--coral-soft)!important;}
.detail-table tfoot td{padding:12px 14px;text-align:right;background:var(--coral);color:#fff;font-weight:800;font-size:12px;border-top:2px solid var(--coral-d);}
.detail-table tfoot td:first-child{text-align:left;}
.chip{background:transparent;color:var(--dark);font-size:12px;font-weight:600;display:inline-block;white-space:nowrap;}
/* ── HORIZONTAL BAR CHART ── */
.hchart-wrap{background:var(--surface);border-radius:var(--rl);border:1.5px solid var(--border);padding:20px 22px 16px;}
.hchart-title{font-size:9px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}
.hbar-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.hbar-row:last-child{border-bottom:none;}
.hbar-label{width:90px;font-size:10px;font-weight:700;color:var(--dark);flex-shrink:0;line-height:1.3;padding-top:2px;}
.hbar-sticks{flex:1;display:flex;flex-direction:column;gap:1px;}
.hbar-group{display:flex;align-items:center;gap:5px;}
.hbar{height:9px;border-radius:0;min-width:2px;cursor:pointer;transition:filter .16s;flex-shrink:0;}
.hbar-group:first-child .hbar{border-radius:0 2px 0 0;}
.hbar-group:last-child .hbar{border-radius:0 0 2px 0;}
.hbar:hover{filter:brightness(1.15);}
.hbar-num{font-size:9px;font-weight:700;color:var(--gris);white-space:nowrap;}
.hbar.b-real{background:var(--coral);}
.hbar.b-obj{background:#27ae60;}
.hbar.b-ant{background:var(--cd);}

/* TWO-COL */
.two-col{display:grid;grid-template-columns:280px 1fr;gap:16px;align-items:start;}
@media(max-width:860px){.two-col{grid-template-columns:1fr;}}
/* CADENA LAYOUT */
.cadena-layout{display:flex;gap:16px;align-items:stretch;margin-bottom:16px;}
.cadena-donut{flex-shrink:0;width:280px;display:flex;flex-direction:column;}
.cadena-donut .donut-wrap{height:100%;margin-bottom:0;display:flex;flex-direction:column;justify-content:flex-start;}
.cadena-donut .donut-inner{flex-direction:column;align-items:center;gap:16px;}
.cadena-donut .donut-legend{grid-template-columns:1fr;gap:7px;}
.cadena-grid{flex:1;}
.cadena-grid .semaforo-grid{margin-bottom:0;}
@media(max-width:860px){.cadena-layout{flex-direction:column;}.cadena-donut{width:100%;}}
/* PAIS LAYOUT */
.pais-layout{display:flex;gap:16px;align-items:stretch;}
.pais-donut{flex-shrink:0;width:260px;display:flex;flex-direction:column;}
.pais-donut .donut-wrap{flex:1;margin-bottom:0;display:flex;flex-direction:column;justify-content:flex-start;overflow:hidden;}
.pais-donut .donut-inner{flex-direction:column;align-items:center;gap:12px;}
.pais-donut .donut-legend{grid-template-columns:1fr;gap:5px;}
.pais-bars{flex:1;display:flex;flex-direction:column;}
.pais-bars .chart-wrap{flex:1;margin-bottom:0;display:flex;flex-direction:column;}
.pais-bars .vbar-area{flex:1;}
@media(max-width:860px){.pais-layout{flex-direction:column;}.pais-donut{width:100%;}}
/* ── TOOLTIP JS ── */
#vt{position:fixed;background:var(--dark);color:#fff;font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;padding:5px 11px;border-radius:8px;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.35);z-index:9999;opacity:0;transition:opacity .12s;transform:translateX(-50%);}
#vt.show{opacity:1;}

/* ── SUMMARY TABLE ── */
.summary-table{width:100%;border-collapse:collapse;margin-bottom:20px;border-radius:var(--r);overflow:hidden;border:1.5px solid var(--border);}
.summary-table th{background:var(--dark);color:rgba(255,255,255,.55);padding:9px 16px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;text-align:right;white-space:nowrap;}
.summary-table th:first-child{text-align:left;}
.summary-table td{padding:13px 16px;font-size:15px;font-weight:800;background:var(--surface);text-align:right;border-bottom:1px solid var(--border);}
.summary-table td:last-child{border-bottom:none;}
.summary-table td:first-child{text-align:left;font-size:12px;font-weight:700;color:var(--gris);border-bottom:none;}
.summary-table tr:last-child td{border-bottom:none;}
.st-real{color:var(--coral);}
.st-ok{color:var(--ok);}
.st-err{color:var(--err);}
@media(max-width:860px){
  .cadena-layout{flex-direction:column;}.cadena-donut{width:100%;}
  .pais-layout{flex-direction:column;}.pais-donut{width:100%;}
}
@media(max-width:720px){
  header,.filtros,.tabs-bar,main{padding-left:14px;padding-right:14px;}
  .h-right{display:none;}
  /* KPI más compactos */
  .kpi-row{grid-template-columns:1fr 1fr;gap:8px;}
  .kpi-val{font-size:22px;}
  /* Semáforo: 1 columna */
  .semaforo-grid{grid-template-columns:1fr;}
  /* Gráfico de barras: scroll horizontal con ancho mínimo */
  .chart-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .vbar-area{min-width:420px;}
  /* Tabla: scroll horizontal */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .detail-table{min-width:520px;}
  /* Donut: centrar */
  .donut-inner{flex-direction:column;align-items:center;}
  .cadena-donut .donut-inner,.pais-donut .donut-inner{flex-direction:column;align-items:center;}
  .donut-legend{grid-template-columns:1fr;}
  /* Padding general */
  main{padding:16px 14px 60px;}
  .kpi-box{padding:14px 14px 12px;}
  /* Hbar más compacto */
  .hbar-label{width:70px;font-size:9px;}
  /* Filtros */
  .filtros{padding:8px 14px;gap:10px;}
  /* Tabs sticky top ajustado */
  .tabs-bar{top:106px;}
}
@media(max-width:400px){
  .kpi-row{grid-template-columns:1fr;}
  .kpi-val{font-size:26px;}
}
</style>
</head>
<body>

<!-- TOOLTIP -->
<div id="vt"></div>

<!-- HEADER -->
<header>
  <div class="h-left">
    <img class="h-logo" src="02_Logo-Viajero_Vertical-Blanco.png" alt="Viajero"
      onerror="this.style.display='none';document.getElementById('logo-fb').style.display='block'"/>
    <span id="logo-fb" style="display:none;font-size:14px;font-weight:900;color:#fff;letter-spacing:.5px;">VIAJERO</span>
    <div class="h-sep"></div>
    <div><div class="h-title">Dashboard Ventas Comercial</div><div class="h-sub">Agencias &amp; Grupos · Viajero Hostels</div></div>
  </div>
  <div class="h-right">
    <a class="btn-hub" href="https://jmedinavh.github.io/viajero-dashboard/index.html">&#8592; Hub</a>
    <div class="h-ts"><div class="h-ts-label">Actualizado</div><div class="h-ts-val" id="h-updated">—</div></div>
    <div class="h-live"><div class="dot"></div>Live</div>
  </div>
</header>

<!-- FILTROS (barra coral) -->
<div class="filtros">
  <div class="fg"><label>Mes</label><select id="mesSel"><option value="">Todos</option></select></div>
</div>

<!-- TABS BAR -->
<div class="tabs-bar" id="tabs-bar"></div>

<!-- MAIN -->
<main id="main-content"></main>

<script>
/* ══════════════════════════════════════════
   TOOLTIP
══════════════════════════════════════════ */
var vt = document.getElementById('vt');
function tipShow(e, txt) {
  vt.textContent = txt;
  vt.classList.add('show');
  tipMove(e);
}
function tipMove(e) {
  vt.style.left = e.clientX + 'px';
  vt.style.top  = (e.clientY - vt.offsetHeight - 12) + 'px';
}
function tipHide() { vt.classList.remove('show'); }
function bindTips(root) {
  root.querySelectorAll('[data-tip]').forEach(function(bar) {
    bar.addEventListener('mouseenter', function(e) { tipShow(e, bar.dataset.tip); });
    bar.addEventListener('mousemove',  function(e) { tipMove(e); });
    bar.addEventListener('mouseleave', tipHide);
  });
}

/* ══════════════════════════════════════════
   CONFIG
══════════════════════════════════════════ */
var DATA_URL = 'https://raw.githubusercontent.com/jmedinavh/dashboard-ventas/main/data/data.json';
var DATA = null;
var mesSel = '';

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
function fmt(n) {
  if (n == null) return '—';
  return '$' + Number(n).toLocaleString('es-CO', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function pct(n) {
  if (n == null) return '—';
  return (n >= 0 ? '+' : '') + (n * 100).toFixed(1) + '%';
}
function pctYoY(n) {
  // Muestra como cumplimiento: real/anterior (no la variación)
  if (n == null) return '—';
  return ((1 + n) * 100).toFixed(1) + '%';
}
function badgeHtml(v) {
  if (v == null) return '<span class="badge b-blue">Nuevo</span>';
  var p = (v * 100).toFixed(0) + '%';
  if (v >= 0.9) return '<span class="badge b-ok">'  + p + '</span>';
  if (v >= 0.5) return '<span class="badge b-warn">' + p + '</span>';
  return '<span class="badge b-err">' + p + '</span>';
}
function colorFor(v) {
  if (v == null) return '#2980b9';
  if (v >= 0.9)  return '#27ae60';
  if (v >= 0.5)  return '#f1c40f';
  return '#e74c3c';
}
function getMes(mesesObj) {
  if (!mesesObj) return null;
  if (mesSel && mesesObj[mesSel]) return mesesObj[mesSel];
  var keys = Object.keys(mesesObj);
  return keys.length ? mesesObj[keys[keys.length - 1]] : null;
}

/* ══════════════════════════════════════════
   BAR CHART — contiene las barras dentro del flex
══════════════════════════════════════════ */
function fmtK(n) {
  if (!n && n !== 0) return '—';
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(2) + 'M';
  if (n >= 1000)    return '$' + (n / 1000).toFixed(1) + 'k';
  return '$' + Math.round(n);
}

function buildBarChart(rows, titleTxt) {
  var maxVal = 1;
  rows.forEach(function(r) {
    if ((r.real     || 0) > maxVal) maxVal = r.real;
    if ((r.objetivo || 0) > maxVal) maxVal = r.objetivo;
    if ((r.anterior || 0) > maxVal) maxVal = r.anterior;
  });
  var H = 180;
  function barH(v) { return Math.max(Math.round(((v || 0) / maxVal) * H), 3); }

  var groups = rows.map(function(r) {
    return '<div class="vbar-group">' +
      '<div class="vbar-sticks">' +
        '<div class="vbar-col"><div class="vbar b-real" style="width:14px;height:' + barH(r.real)     + 'px" data-tip="YTD: '     + fmt(r.real)     + '"></div></div>' +
        '<div class="vbar-col"><div class="vbar b-obj"  style="width:14px;height:' + barH(r.objetivo) + 'px" data-tip="Obj: '      + fmt(r.objetivo) + '"></div></div>' +
        '<div class="vbar-col"><div class="vbar b-ant"  style="width:14px;height:' + barH(r.anterior) + 'px" data-tip="Año ant.: ' + fmt(r.anterior) + '"></div></div>' +
      '</div>' +
      '<div class="vbar-lbl">' + r.label + '</div>' +
    '</div>';
  }).join('');

  return '<div class="chart-wrap">' +
    '<div class="chart-title">' + titleTxt + '</div>' +
    '<div class="vbar-area">' + groups + '</div>' +
    '<div class="chart-legend">' +
      '<span class="leg-item"><span class="leg-dot" style="background:var(--coral)"></span>YTD</span>' +
      '<span class="leg-item"><span class="leg-dot" style="background:#27ae60"></span>Objetivo</span>' +
      '<span class="leg-item"><span class="leg-dot" style="background:var(--cd)"></span>Año anterior</span>' +
    '</div></div>';
}

function buildDonut(paisesData) {
  var COLORS = ['#F04B24','#27ae60','#0369a1','#854d0e','#8b5cf6','#10b981','#f59e0b','#6B3A28','#64748b'];
  var entries = Object.values(paisesData).filter(function(p) { return p.total && p.total.real > 0; });
  entries.sort(function(a,b){
    var va = a.total.varObj != null ? a.total.varObj : -999;
    var vb = b.total.varObj != null ? b.total.varObj : -999;
    return vb - va; // mayor a menor por cumplimiento
  });
  var total   = entries.reduce(function(s, p) { return s + p.total.real; }, 0);
  if (!total) return '';

  var r = 72, cx = 90, cy = 90, sw = 30;
  var circ   = 2 * Math.PI * r;
  var offset = 0;
  var segs   = entries.map(function(p, i) {
    var frac = p.total.real / total;
    var dash = frac * circ;
    var col  = COLORS[i % COLORS.length];
    var s = '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none"' +
      ' stroke="' + col + '" stroke-width="' + sw + '"' +
      ' stroke-dasharray="' + dash.toFixed(2) + ' ' + (circ - dash + 0.5).toFixed(2) + '"' +
      ' stroke-dashoffset="' + (-(offset)).toFixed(2) + '"' +
      ' transform="rotate(-90 ' + cx + ' ' + cy + ')"' +
      ' style="cursor:pointer" data-tip="' + p.nombre + ': ' + fmt(p.total.real) + ' (' + (frac * 100).toFixed(1) + '%)"></circle>';
    offset += dash;
    return { svg: s, p: p, frac: frac, col: col };
  });

  var svgHtml = '<svg width="180" height="180" viewBox="0 0 180 180">' +
    segs.map(function(s) { return s.svg; }).join('') +
    '<text x="90" y="84" text-anchor="middle" font-family="Outfit,sans-serif" font-size="12" font-weight="700" fill="#7A6E68">Total</text>' +
    '<text x="90" y="103" text-anchor="middle" font-family="Outfit,sans-serif" font-size="15" font-weight="800" fill="#1E100A">' + fmtK(total) + '</text>' +
    '</svg>';

  var legHtml = segs.map(function(s) {
    return '<div class="dl-item">' +
      '<div class="dl-dot" style="background:' + s.col + '"></div>' +
      '<span class="dl-name">' + s.p.nombre + '</span>' +
      '<span class="dl-pct" style="color:' + s.col + '">' + (s.frac * 100).toFixed(1) + '%</span>' +
      '<span class="dl-val">' + fmtK(s.p.total.real) + '</span>' +
    '</div>';
  }).join('');

  return '<div class="donut-wrap">' +
    '<div class="donut-title">Participación por país — Ventas reales</div>' +
    '<div class="donut-inner">' +
      '<div>' + svgHtml + '</div>' +
      '<div class="donut-legend">' + legHtml + '</div>' +
    '</div></div>';
}

/* ══════════════════════════════════════════
   HORIZONTAL BAR CHART
══════════════════════════════════════════ */
function buildHBarChart(rows, titleTxt) {
  var maxVal = 1;
  rows.forEach(function(r) {
    if ((r.real||0) > maxVal) maxVal = r.real;
    if ((r.objetivo||0) > maxVal) maxVal = r.objetivo;
    if ((r.anterior||0) > maxVal) maxVal = r.anterior;
  });
  var W = 160;
  function bw(v) { return Math.max(Math.round(((v||0)/maxVal)*W), 2); }
  var rowsHtml = rows.map(function(r) {
    return '<div class="hbar-row">' +
      '<div class="hbar-label">' + r.label + '</div>' +
      '<div class="hbar-sticks">' +
        '<div class="hbar-group"><div class="hbar b-real" style="width:'+bw(r.real)+'px" data-tip="YTD: '+fmt(r.real)+'"></div><span class="hbar-num">'+fmtK(r.real)+'</span></div>' +
        '<div class="hbar-group"><div class="hbar b-obj" style="width:'+bw(r.objetivo)+'px" data-tip="Obj: '+fmt(r.objetivo)+'"></div><span class="hbar-num">'+fmtK(r.objetivo)+'</span></div>' +
        '<div class="hbar-group"><div class="hbar b-ant" style="width:'+bw(r.anterior)+'px" data-tip="Año ant.: '+fmt(r.anterior)+'"></div><span class="hbar-num">'+fmtK(r.anterior)+'</span></div>' +
      '</div>' +
    '</div>';
  }).join('');
  return '<div class="hchart-wrap">' +
    '<div class="hchart-title">' + titleTxt + '</div>' +
    rowsHtml +
    '<div class="chart-legend" style="margin-top:12px">' +
      '<span class="leg-item"><span class="leg-dot" style="background:var(--coral)"></span>YTD</span>' +
      '<span class="leg-item"><span class="leg-dot" style="background:#27ae60"></span>Objetivo</span>' +
      '<span class="leg-item"><span class="leg-dot" style="background:var(--cd)"></span>Año anterior</span>' +
    '</div></div>';
}

/* ══════════════════════════════════════════
   DONUT POR HOSTAL
══════════════════════════════════════════ */
function buildDonutHostales(hostales) {
  var COLORS=['#F04B24','#27ae60','#0369a1','#854d0e','#8b5cf6','#10b981','#f59e0b','#6B3A28','#64748b','#be123c','#0f766e'];
  var entries=hostales.map(function(h){
    var m=getMes(h.meses);
    return{nombre:h.nombre_completo,short:h.short,real:m?(m.real||0):0,varObj:m?m.varObj:null};
  }).filter(function(h){return h.real>0;});
  entries.sort(function(a,b){
    var va=a.varObj!=null?a.varObj:-999,vb=b.varObj!=null?b.varObj:-999;
    return vb-va;
  });
  var total=entries.reduce(function(s,h){return s+h.real;},0);
  if(!total)return'';
  var r=52,cx=66,cy=66,sw=26,circ=2*Math.PI*r,offset=0;
  var segs=entries.map(function(p,i){
    var frac=p.real/total,dash=frac*circ,col=COLORS[i%COLORS.length];
    var s='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="'+sw+'" stroke-dasharray="'+dash.toFixed(2)+' '+(circ-dash+.5).toFixed(2)+'" stroke-dashoffset="'+(-(offset)).toFixed(2)+'" transform="rotate(-90 '+cx+' '+cy+')" style="cursor:pointer" data-tip="'+p.short+': '+fmt(p.real)+' ('+(frac*100).toFixed(1)+'%)"></circle>';
    offset+=dash;
    return{svg:s,p:p,frac:frac,col:col};
  });
  var svgHtml='<svg width="132" height="132" viewBox="0 0 132 132">'+segs.map(function(s){return s.svg;}).join('')+'<text x="66" y="61" text-anchor="middle" font-family="Outfit,sans-serif" font-size="11" font-weight="700" fill="#7A6E68">YTD</text><text x="66" y="79" text-anchor="middle" font-family="Outfit,sans-serif" font-size="13" font-weight="800" fill="#1E100A">'+fmtK(total)+'</text></svg>';
  var MAX_V = 6;
  var uid = 'dh' + Math.random().toString(36).substr(2,5);
  var legHtml=segs.map(function(s,i){
    var extra = i >= MAX_V ? ' class="dl-item dh-x-'+uid+'" style="display:none"' : ' class="dl-item"';
    return '<div'+extra+'>'+
      '<div class="dl-dot" style="background:'+s.col+'"></div>'+
      '<span class="dl-name">'+s.p.short+'</span>'+
      '<span class="dl-pct" style="color:'+s.col+'">'+(s.frac*100).toFixed(1)+'%</span>'+
      '<span class="dl-val">'+fmtK(s.p.real)+'</span>'+
    '</div>';
  }).join('');
  var verMasBtn = segs.length > MAX_V
    ? '<button id="mas-'+uid+'" onclick="document.querySelectorAll(\'.dh-x-'+uid+'\').forEach(function(e){e.style.display=\'\';});this.style.display=\'none\';document.getElementById(\'menos-'+uid+'\').style.display=\'\'" style="margin-top:6px;font-family:Outfit,sans-serif;font-size:9px;font-weight:700;color:var(--coral);background:none;border:none;cursor:pointer;padding:0;letter-spacing:.3px">▼ Ver más ('+(segs.length-MAX_V)+')</button>' +
      '<button id="menos-'+uid+'" onclick="document.querySelectorAll(\'.dh-x-'+uid+'\').forEach(function(e){e.style.display=\'none\';});this.style.display=\'none\';document.getElementById(\'mas-'+uid+'\').style.display=\'\'" style="display:none;margin-top:6px;font-family:Outfit,sans-serif;font-size:9px;font-weight:700;color:var(--gris);background:none;border:none;cursor:pointer;padding:0;letter-spacing:.3px">▲ Ver menos</button>'
    : '';
  return '<div class="donut-wrap">'+
    '<div class="donut-title">Participación por hostal</div>'+
    '<div class="donut-inner"><div>'+svgHtml+'</div>'+
    '<div class="donut-legend">'+legHtml+verMasBtn+'</div></div></div>';
}

/* ══════════════════════════════════════════
   RENDER CADENA
══════════════════════════════════════════ */
function renderCadena() {
  var el = document.getElementById('panel-cadena');
  if (!el) return;
  var c = DATA.cadena;

  var kpiLabel = mesSel ? 'YTD · ' + mesSel : 'YTD';

  var html = '';

  /* KPIs cadena */
  var yoyColorC = c.varYoY == null ? 'var(--dark)' : c.varYoY >= 0 ? 'var(--ok)' : 'var(--err)';
  html += '<div class="sec">' +
    '<div class="sec-hdr"><h2>Resumen de cadena</h2><div class="linea"></div></div>' +
    '<div class="kpi-row">' +
      '<div class="kpi-box" style="--kc:var(--coral)">' +
        '<div class="kpi-label">YTD Acumulado</div>' +
        '<div class="kpi-val" style="color:var(--coral)">' + fmt(c.real) + '</div>' +
        '<div class="kpi-sub">USD total cadena</div></div>' +
      '<div class="kpi-box" style="--kc:#27ae60">' +
        '<div class="kpi-label">Objetivo</div>' +
        '<div class="kpi-val">' + fmt(c.objetivo) + '</div>' +
        '<div class="kpi-sub">Meta del período</div></div>' +
      '<div class="kpi-box" style="--kc:var(--blue)">' +
        '<div class="kpi-label">Año anterior</div>' +
        '<div class="kpi-val">' + fmt(c.anterior) + '</div>' +
        '<div class="kpi-sub" style="color:' + yoyColorC + ';font-weight:700">vs Año ant. ' + pctYoY(c.varYoY) + '</div></div>' +
      '<div class="kpi-box" style="--kc:#8b5cf6">' +
        '<div class="kpi-label">Cumplimiento</div>' +
        '<div class="kpi-val" style="color:' + colorFor(c.varObj) + '">' + (c.varObj != null ? (c.varObj * 100).toFixed(1) + '%' : '—') + '</div>' +
        '<div class="kpi-sub">' + badgeHtml(c.varObj) + '</div></div>' +
    '</div></div>';

  /* Donut + Semáforo */
  html += '<div class="sec"><div class="sec-hdr"><h2>Distribución y estado por país</h2><div class="linea"></div></div>' +
    '<div class="cadena-layout"><div class="cadena-donut">' + buildDonut(DATA.paises) + '</div><div class="cadena-grid"><div class="semaforo-grid">';

  Object.entries(DATA.paises).forEach(function(entry) {
    var key = entry[0], p = entry[1];
    var t = p.total; if (!t) return;
    var fill = t.varObj != null ? Math.min(t.varObj * 100, 100) : 0;
    var yoyColor = t.varYoY == null ? 'color:var(--gris)' : t.varYoY >= 0 ? 'color:var(--ok)' : 'color:var(--err)';
    html += '<div class="pais-card" style="--pc:' + colorFor(t.varObj) + '">' +
      '<div class="pc-header">' +
        '<div class="pc-nombre">' + p.nombre + '</div>' +
        badgeHtml(t.varObj) +
      '</div>' +
      '<div class="pc-cifras">' +
        '<div><div class="cf-label">YTD</div><div class="cf-val coral">' + fmt(t.real) + '</div></div>' +
        '<div><div class="cf-label">Objetivo</div><div class="cf-val">' + fmt(t.objetivo) + '</div></div>' +
        '<div><div class="cf-label">Año anterior</div><div class="cf-val">' + fmt(t.anterior) + '</div></div>' +
        '<div><div class="cf-label">vs Año ant.</div><div class="cf-val" style="' + yoyColor + '">' + pctYoY(t.varYoY) + '</div></div>' +
      '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + fill + '%;background:' + colorFor(t.varObj) + '"></div></div>' +
      '<div class="bar-meta"><span>' + (t.varObj != null ? (t.varObj * 100).toFixed(1) + '% del objetivo' : 'Sin base anterior') + '</span></div>' +
    '</div>';
  });

  html += '</div></div></div></div>';

  /* Gráfico cadena */
  var rows = Object.values(DATA.paises)
    .filter(function(p) { return p.total; })
    .map(function(p) { return { label: p.nombre, real: p.total.real, objetivo: p.total.objetivo, anterior: p.total.anterior }; });

  html += '<div class="sec"><div class="sec-hdr"><h2>YTD vs Objetivo vs Año anterior</h2><div class="linea"></div></div>' +
    buildBarChart(rows, 'Comparativo por país — YTD') +
  '</div>';

  el.innerHTML = html;
  bindTips(el);
}

/* ══════════════════════════════════════════
   RENDER PAÍS
══════════════════════════════════════════ */
function renderPais(key) {
  var el = document.getElementById('panel-' + key);
  if (!el) return;
  var p = DATA.paises[key];
  if (!p || !p.hostales) { el.innerHTML = '<p style="color:var(--gris);padding:20px;">Sin datos.</p>'; return; }
  var t = p.total;
  var kpiLabel = mesSel ? 'YTD · ' + mesSel : 'YTD';

  var html = '';

  /* KPIs país */
  var yoyColor = t && t.varYoY != null ? (t.varYoY >= 0 ? 'var(--ok)' : 'var(--err)') : 'var(--dark)';
  html += '<div class="sec">' +
    '<div class="sec-hdr"><h2>Resumen ' + p.nombre + '</h2><div class="linea"></div></div>' +
    '<div class="kpi-row">' +
      '<div class="kpi-box" style="--kc:var(--coral)">' +
        '<div class="kpi-label">YTD Acumulado</div>' +
        '<div class="kpi-val" style="color:var(--coral)">' + fmt(t && t.real) + '</div>' +
        '<div class="kpi-sub">USD</div></div>' +
      '<div class="kpi-box" style="--kc:#27ae60">' +
        '<div class="kpi-label">Objetivo</div>' +
        '<div class="kpi-val">' + fmt(t && t.objetivo) + '</div>' +
        '<div class="kpi-sub">Meta del período</div></div>' +
      '<div class="kpi-box" style="--kc:var(--blue)">' +
        '<div class="kpi-label">Año anterior</div>' +
        '<div class="kpi-val">' + fmt(t && t.anterior) + '</div>' +
        '<div class="kpi-sub" style="color:' + yoyColor + ';font-weight:700">vs Año ant. ' + pctYoY(t && t.varYoY) + '</div></div>' +
      '<div class="kpi-box" style="--kc:#8b5cf6">' +
        '<div class="kpi-label">Cumplimiento</div>' +
        '<div class="kpi-val" style="color:' + colorFor(t && t.varObj) + '">' + (t && t.varObj != null ? (t.varObj * 100).toFixed(1) + '%' : '—') + '</div>' +
        '<div class="kpi-sub">' + badgeHtml(t && t.varObj) + '</div></div>' +
    '</div></div>';

  /* Gráfico por hostal */
  var bcRows = p.hostales.map(function(h) {
    var m = getMes(h.meses);
    return { label: h.short || h.nombre_completo, real: m ? m.real : 0, objetivo: m ? m.objetivo : 0, anterior: m ? m.anterior : 0 };
  });

  /* Donut + barras en dos columnas */
  var donutHtml = buildDonutHostales(p.hostales);
  var barHtml2  = buildBarChart(bcRows, 'YTD vs Objetivo vs Año anterior — ' + kpiLabel);
  if (donutHtml) {
    html += '<div class="sec">' +
      '<div class="sec-hdr"><h2>Distribución y comparativo por hostal</h2><div class="linea"></div></div>' +
      '<div class="pais-layout"><div class="pais-donut">' + donutHtml + '</div><div class="pais-bars">' + barHtml2 + '</div></div></div>';
  } else {
    html += '<div class="sec">' +
      '<div class="sec-hdr"><h2>Comparativo por hostal</h2><div class="linea"></div></div>' +
      barHtml2 + '</div>';
  }

  /* Tabla detalle */
  html += '<div class="sec">' +
    '<div class="sec-hdr"><h2>Detalle por hostal</h2><div class="linea"></div></div>' +
    '<div class="table-wrap"><table class="detail-table">' +
    '<thead><tr>' +
      '<th>Hostal</th><th>YTD (USD)</th><th>Año ant.</th><th>Objetivo</th><th>vs Año ant.</th><th>vs Objetivo</th>' +
    '</tr></thead><tbody>';

  p.hostales.forEach(function(h) {
    var m = getMes(h.meses); if (!m) return;
    var fill = m.varObj != null ? Math.min(m.varObj * 100, 100) : 0;
    var vc = m.varYoY == null ? 'color:var(--gris)' : m.varYoY >= 0 ? 'color:var(--ok)' : 'color:var(--err)';
    html += '<tr>' +
      '<td><span class="chip">' + h.nombre_completo + '</span></td>' +
      '<td>' + fmt(m.real) + '</td>' +
      '<td>' + fmt(m.anterior) + '</td>' +
      '<td>' + fmt(m.objetivo) + '</td>' +
      '<td style="font-weight:700;' + vc + '">' + pctYoY(m.varYoY) + '</td>' +
      '<td>' + badgeHtml(m.varObj) +
        '<div style="margin-top:5px"><div class="bar-track" style="width:80px">' +
          '<div class="bar-fill" style="width:' + fill + '%;background:' + colorFor(m.varObj) + '"></div>' +
        '</div></div></td>' +
    '</tr>';
  });

  html += '</tbody><tfoot><tr>' +
    '<td>TOTAL ' + p.nombre.toUpperCase() + '</td>' +
    '<td>' + fmt(t && t.real) + '</td>' +
    '<td>' + fmt(t && t.anterior) + '</td>' +
    '<td>' + fmt(t && t.objetivo) + '</td>' +
    '<td>' + pctYoY(t && t.varYoY) + '</td>' +
    '<td>' + (t && t.varObj != null ? (t.varObj * 100).toFixed(1) + '%' : '—') + '</td>' +
  '</tr></tfoot></table></div></div>';

  el.innerHTML = html;
  bindTips(el);
}

/* ══════════════════════════════════════════
   TABS
══════════════════════════════════════════ */
function buildTabs() {
  var bar  = document.getElementById('tabs-bar');
  var main = document.getElementById('main-content');

  function addTab(key, label) {
    var btn = document.createElement('button');
    btn.className = 'tab-btn'; btn.dataset.key = key; btn.textContent = label;
    bar.appendChild(btn);
    var panel = document.createElement('div');
    panel.className = 'tab-content'; panel.id = 'panel-' + key;
    main.appendChild(panel);
  }

  addTab('cadena', '🌎 Cadena');
  Object.keys(DATA.paises).forEach(function(key) {
    var p = DATA.paises[key];
    addTab(key, p.nombre);
  });

  bar.querySelector('.tab-btn').classList.add('active');
  main.querySelector('.tab-content').classList.add('active');

  bar.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      bar.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      main.querySelectorAll('.tab-content').forEach(function(p) { p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.key).classList.add('active');
    });
  });
}

/* ══════════════════════════════════════════
   RENDER ALL
══════════════════════════════════════════ */
function renderAll() {
  renderCadena();
  Object.keys(DATA.paises).forEach(function(key) { renderPais(key); });
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', function() {
  fetch(DATA_URL + '?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      DATA = data;

      /* meses disponibles */
      var mesesSet = new Set();
      Object.values(DATA.paises).forEach(function(p) {
        (p.meses || []).forEach(function(m) { mesesSet.add(m); });
      });
      var meses = Array.from(mesesSet).sort();
      mesSel = meses[meses.length - 1] || '';

      var sel = document.getElementById('mesSel');
      meses.forEach(function(m) {
        var o = document.createElement('option');
        o.value = m; o.textContent = 'YTD · ' + m;
        sel.appendChild(o);
      });
      sel.value = mesSel;
      sel.addEventListener('change', function(e) { mesSel = e.target.value; renderAll(); });

      document.getElementById('h-updated').textContent =
        new Date(DATA.updated).toLocaleDateString('es-CO', {day:'2-digit', month:'short', year:'numeric'});

      buildTabs();
      renderAll();
    })
    .catch(function(err) {
      document.getElementById('main-content').innerHTML =
        '<div style="padding:60px;text-align:center;color:var(--gris)"><div style="font-size:32px;margin-bottom:12px">⚠️</div>' +
        '<div style="font-weight:700;font-size:14px">Error al cargar los datos</div>' +
        '<div style="font-size:12px;margin-top:6px;color:var(--err)">Verifica que el JSON está disponible en GitHub.</div></div>';
    });
});
