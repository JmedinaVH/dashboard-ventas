<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Ventas — Viajero Hostels</title>
<style>
  :root {
    --dark: #1a1a18; --light: #f5f4ef; --green: #27ae60;
    --yellow: #f1c40f; --red: #e74c3c; --blue: #2980b9;
    --card: #ffffff; --border: #e0dfd8; --muted: #888;
    --green-bg: #d4f0e4; --yellow-bg: #fef9e7; --red-bg: #fdecea;
    --blue-bg: #eaf3fb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light); color: var(--dark); }
  header { background: var(--dark); color: #fff; padding: 18px 32px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  header .sub { font-size: 0.85rem; color: #aaa; margin-top: 2px; }
  .controls { background: #fff; border-bottom: 1px solid var(--border); padding: 12px 32px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .controls label { font-size: 0.85rem; color: var(--muted); }
  .controls select { border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-size: 0.9rem; background: #fff; cursor: pointer; }
  .tabs { display: flex; gap: 4px; padding: 16px 32px 0; overflow-x: auto; }
  .tab { padding: 8px 18px; border-radius: 8px 8px 0 0; border: 1px solid var(--border); border-bottom: none; background: #eee; cursor: pointer; font-size: 0.88rem; white-space: nowrap; transition: background .15s; }
  .tab.active { background: #fff; font-weight: 600; }
  .content { padding: 0 32px 40px; }
  .panel { display: none; background: #fff; border: 1px solid var(--border); border-radius: 0 8px 8px 8px; padding: 24px; }
  .panel.active { display: block; }
  /* Cadena */
  .semaforo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .pais-card { border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; background: var(--card); }
  .pais-card .nombre { font-weight: 700; font-size: 1rem; margin-bottom: 8px; }
  .pais-card .cifras { display: flex; gap: 12px; font-size: 0.82rem; color: var(--muted); margin-bottom: 10px; flex-wrap: wrap; }
  .pais-card .cifras span b { color: var(--dark); }
  .bar-track { height: 10px; border-radius: 5px; background: #eee; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 5px; transition: width .5s; }
  .bar-label { font-size: 0.78rem; margin-top: 4px; color: var(--muted); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin-left: 6px; }
  .badge.green { background: var(--green-bg); color: #1a6b3e; }
  .badge.yellow { background: var(--yellow-bg); color: #7d6308; }
  .badge.red { background: var(--red-bg); color: #8b1a1a; }
  .badge.blue { background: var(--blue-bg); color: #1a4f7a; }
  /* Gráfico comparativo */
  .chart-section { margin-top: 28px; }
  .chart-section h3 { font-size: 0.95rem; margin-bottom: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-row .label { width: 120px; font-size: 0.82rem; text-align: right; color: var(--dark); }
  .bar-row .bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .bar-row .bar { height: 12px; border-radius: 4px; min-width: 2px; transition: width .5s; }
  .bar-row .val { font-size: 0.75rem; color: var(--muted); width: 70px; }
  .bar-real { background: #2980b9; }
  .bar-obj  { background: #27ae60; }
  .bar-ant  { background: #bbb; }
  /* Tabla detalle */
  .detail-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.88rem; }
  .detail-table th { background: var(--dark); color: #fff; padding: 9px 12px; text-align: right; font-weight: 600; }
  .detail-table th:first-child { text-align: left; border-radius: 6px 0 0 0; }
  .detail-table th:last-child { border-radius: 0 6px 0 0; }
  .detail-table td { padding: 8px 12px; text-align: right; border-bottom: 1px solid var(--border); }
  .detail-table td:first-child { text-align: left; }
  .detail-table tr:hover td { background: #f7f6f2; }
  .detail-table tr.total td { background: var(--green-bg); font-weight: 700; border-top: 2px solid #27ae60; }
  .detail-table tr.total td:first-child { border-radius: 0 0 0 6px; }
  .detail-table tr.total td:last-child  { border-radius: 0 0 6px 0; }
  .chip { background: #eaf3de; color: #27500a; border-radius: 12px; padding: 2px 10px; font-size: 0.8rem; font-weight: 600; display: inline-block; }
  .updated { font-size: 0.75rem; color: var(--muted); margin-left: auto; }
  /* resumen cadena */
  .cadena-kpi { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 24px; }
  .kpi-box { border: 1px solid var(--border); border-radius: 10px; padding: 16px 24px; background: var(--card); min-width: 160px; }
  .kpi-box .kpi-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .kpi-box .kpi-val { font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
  .kpi-box .kpi-sub { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  @media (max-width: 600px) {
    header, .controls, .tabs, .content { padding-left: 16px; padding-right: 16px; }
    .bar-row .label { width: 80px; }
  }
</style>
</head>
<body>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/jmedinavh/dashboard-ventas/main/data/data.json';

let DATA = null;
let mesSel = null;

async function init() {
  const res = await fetch(DATA_URL + '?t=' + Date.now());
  DATA = await res.json();

  // Detectar meses disponibles (union de todos los países)
  const mesesSet = new Set();
  Object.values(DATA.paises).forEach(p => (p.meses || []).forEach(m => mesesSet.add(m)));
  const meses = [...mesesSet];
  mesSel = meses[meses.length - 1];

  // Selector de mes
  const sel = document.getElementById('mesSel');
  meses.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m;
    sel.appendChild(o);
  });
  sel.value = mesSel;
  sel.addEventListener('change', e => { mesSel = e.target.value; renderAll(); });

  // Fecha actualización
  document.getElementById('updated').textContent =
    'Actualizado: ' + new Date(DATA.updated).toLocaleDateString('es-CO', { day:'2-digit', month:'short', year:'numeric' });

  buildTabs();
  renderAll();
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  const contentEl = document.getElementById('content');

  // Tab Cadena
  addTab(tabsEl, contentEl, 'cadena', '🌎 Cadena');
  // Tabs por país
  Object.keys(DATA.paises).forEach(key => {
    const p = DATA.paises[key];
    addTab(tabsEl, contentEl, key, `${p.emoji} ${p.nombre}`);
  });

  document.querySelector('.tab').classList.add('active');
  document.querySelector('.panel').classList.add('active');

  tabsEl.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      tabsEl.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      contentEl.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('panel-' + t.dataset.tab).classList.add('active');
    });
  });
}

function addTab(tabsEl, contentEl, key, label) {
  const t = document.createElement('div');
  t.className = 'tab'; t.dataset.tab = key; t.textContent = label;
  tabsEl.appendChild(t);
  const p = document.createElement('div');
  p.className = 'panel'; p.id = 'panel-' + key;
  contentEl.appendChild(p);
}

function renderAll() {
  renderCadena();
  Object.keys(DATA.paises).forEach(key => renderPais(key));
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  return '$' + Number(n).toLocaleString('es-CO', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function pct(n) {
  if (n === null || n === undefined) return '—';
  return (n >= 0 ? '+' : '') + (n * 100).toFixed(1) + '%';
}
function badge(varObj) {
  if (varObj === null) return '<span class="badge blue">Nuevo</span>';
  if (varObj >= 0.9)   return `<span class="badge green">${(varObj*100).toFixed(0)}%</span>`;
  if (varObj >= 0.5)   return `<span class="badge yellow">${(varObj*100).toFixed(0)}%</span>`;
  return `<span class="badge red">${(varObj*100).toFixed(0)}%</span>`;
}
function color(varObj) {
  if (varObj === null) return '#2980b9';
  if (varObj >= 0.9)  return '#27ae60';
  if (varObj >= 0.5)  return '#f1c40f';
  return '#e74c3c';
}

function getMes(paisData, hostalMeses) {
  // Busca el mes seleccionado o el último disponible
  if (hostalMeses && hostalMeses[mesSel]) return hostalMeses[mesSel];
  if (hostalMeses) {
    const keys = Object.keys(hostalMeses);
    return hostalMeses[keys[keys.length - 1]];
  }
  return null;
}

function renderCadena() {
  const el = document.getElementById('panel-cadena');
  const c = DATA.cadena;
  const maxReal = Math.max(...Object.values(DATA.paises).map(p => {
    const m = getMes(p, p.hostales ? Object.fromEntries(Object.entries(
      p.hostales.reduce((acc, h) => {
        Object.keys(h.meses).forEach(k => { if (!acc[k]) acc[k]={real:0,anterior:0,objetivo:0}; acc[k].real+=h.meses[k].real; acc[k].anterior+=h.meses[k].anterior; acc[k].objetivo+=h.meses[k].objetivo; }); return acc;
      }, {})
    )) : null);
    return p.total ? p.total.real : 0;
  }));

  let html = `
  <div class="cadena-kpi">
    <div class="kpi-box"><div class="kpi-label">Real ${mesSel}</div><div class="kpi-val">${fmt(c.real)}</div><div class="kpi-sub">USD</div></div>
    <div class="kpi-box"><div class="kpi-label">Objetivo</div><div class="kpi-val">${fmt(c.objetivo)}</div><div class="kpi-sub">${badge(c.varObj).replace(/>/g,'>').replace(/</g,'<')}</div></div>
    <div class="kpi-box"><div class="kpi-label">Año anterior</div><div class="kpi-val">${fmt(c.anterior)}</div><div class="kpi-sub">YoY ${pct(c.varYoY)}</div></div>
  </div>
  <div class="semaforo-grid">`;

  Object.entries(DATA.paises).forEach(([key, p]) => {
    const t = p.total;
    if (!t) return;
    const pct_obj = t.varObj !== null ? Math.min(t.varObj * 100, 100) : 0;
    html += `
    <div class="pais-card">
      <div class="nombre">${p.emoji} ${p.nombre} ${badge(t.varObj)}</div>
      <div class="cifras">
        <span>Real: <b>${fmt(t.real)}</b></span>
        <span>Obj: <b>${fmt(t.objetivo)}</b></span>
        <span>YoY: <b>${pct(t.varYoY)}</b></span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct_obj}%;background:${color(t.varObj)}"></div></div>
      <div class="bar-label">${t.varObj !== null ? (t.varObj*100).toFixed(1)+'% del objetivo' : 'Sin base anterior'}</div>
    </div>`;
  });

  html += `</div><div class="chart-section"><h3>Real vs Objetivo vs Año anterior (${mesSel})</h3><div class="bar-chart">`;

  const maxBar = Math.max(...Object.values(DATA.paises).map(p => Math.max(p.total?.real||0, p.total?.objetivo||0, p.total?.anterior||0)), 1);
  Object.entries(DATA.paises).forEach(([key, p]) => {
    const t = p.total;
    if (!t) return;
    const w = v => Math.round((v / maxBar) * 100);
    html += `
    <div class="bar-row">
      <div class="label">${p.emoji} ${p.nombre}</div>
      <div class="bars">
        <div class="bar bar-real" style="width:${w(t.real)}%" title="Real: ${fmt(t.real)}"></div>
        <div class="bar bar-obj"  style="width:${w(t.objetivo)}%" title="Obj: ${fmt(t.objetivo)}"></div>
        <div class="bar bar-ant"  style="width:${w(t.anterior)}%" title="Ant: ${fmt(t.anterior)}"></div>
      </div>
      <div class="val">${fmt(t.real)}</div>
    </div>`;
  });

  html += `</div>
  <div style="margin-top:12px;display:flex;gap:16px;font-size:0.8rem;">
    <span><span style="display:inline-block;width:14px;height:10px;background:#2980b9;border-radius:2px;margin-right:4px;"></span>Real</span>
    <span><span style="display:inline-block;width:14px;height:10px;background:#27ae60;border-radius:2px;margin-right:4px;"></span>Objetivo</span>
    <span><span style="display:inline-block;width:14px;height:10px;background:#bbb;border-radius:2px;margin-right:4px;"></span>Año anterior</span>
  </div>
  </div>`;

  el.innerHTML = html;
}

function renderPais(key) {
  const el = document.getElementById('panel-' + key);
  if (!el) return;
  const p = DATA.paises[key];
  if (!p || !p.hostales) { el.innerHTML = '<p style="color:var(--muted)">Sin datos</p>'; return; }

  const t = p.total;
  const maxBar = Math.max(...p.hostales.map(h => { const m = getMes(p, h.meses); return m ? Math.max(m.real, m.objetivo, m.anterior) : 0; }), 1);

  let html = `
  <div class="cadena-kpi">
    <div class="kpi-box"><div class="kpi-label">Real ${mesSel}</div><div class="kpi-val">${fmt(t?.real)}</div></div>
    <div class="kpi-box"><div class="kpi-label">Objetivo</div><div class="kpi-val">${fmt(t?.objetivo)}</div><div class="kpi-sub">${badge(t?.varObj)}</div></div>
    <div class="kpi-box"><div class="kpi-label">YoY</div><div class="kpi-val" style="color:${t?.varYoY>=0?'var(--green)':'var(--red)'}">${pct(t?.varYoY)}</div></div>
  </div>
  <table class="detail-table">
  <thead><tr>
    <th>Hostal</th>
    <th>Real (USD)</th>
    <th>Año Ant.</th>
    <th>Objetivo</th>
    <th>Var YoY</th>
    <th>Cumplimiento</th>
  </tr></thead><tbody>`;

  p.hostales.forEach(h => {
    const m = getMes(p, h.meses);
    if (!m) return;
    const w = v => Math.round((v / maxBar) * 60);
    html += `<tr>
      <td><span class="chip">${h.nombre_completo}</span></td>
      <td>${fmt(m.real)}</td>
      <td>${fmt(m.anterior)}</td>
      <td>${fmt(m.objetivo)}</td>
      <td style="color:${m.varYoY===null?'var(--muted)':m.varYoY>=0?'var(--green)':'var(--red)'}">${pct(m.varYoY)}</td>
      <td>${badge(m.varObj)}
        <div style="margin-top:4px"><div class="bar-track" style="width:80px"><div class="bar-fill" style="width:${m.varObj!==null?Math.min(m.varObj*100,100):0}%;background:${color(m.varObj)}"></div></div></div>
      </td>
    </tr>`;
  });

  html += `
  </tbody>
  <tfoot><tr class="total">
    <td>TOTAL ${p.nombre.toUpperCase()}</td>
    <td>${fmt(t?.real)}</td>
    <td>${fmt(t?.anterior)}</td>
    <td>${fmt(t?.objetivo)}</td>
    <td style="color:${t?.varYoY>=0?'var(--green)':'var(--red)'}">${pct(t?.varYoY)}</td>
    <td>${badge(t?.varObj)}</td>
  </tr></tfoot>
  </table>`;

  el.innerHTML = html;
}

window.addEventListener('DOMContentLoaded', init);
</script>

<header>
  <div>
    <h1>🌎 Dashboard Ventas — Viajero Hostels</h1>
    <div class="sub">Área Comercial · Agencias & Grupos</div>
  </div>
  <span class="updated" id="updated"></span>
</header>

<div class="controls">
  <label>Mes:</label>
  <select id="mesSel"></select>
</div>

<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>

</body>
</html>
