<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Ventas · Comercial — Viajero Hostels</title>
<link rel="icon" type="image/png" href="favicon-32x32.png"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* Forzar fuente nativa de emojis — Outfit no los incluye */
@font-face {
  font-family: 'Outfit';
  src: local('Apple Color Emoji'), local('Segoe UI Emoji'), local('Noto Color Emoji');
  unicode-range: U+1F000-1FFFF, U+2600-27FF, U+FE00-FE0F, U+1F300-1F9FF;
}
</style>
<style>
:root {
  --coral: #F04B24;
  --coral-d: #C93A18;
  --coral-soft: #FEF0EC;
  --coral-mid: #f9c4b6;
  --cream: #F5F0EA;
  --cm: #EDE5DA;
  --cd: #DDD4CA;
  --border: #E2D8CF;
  --dark: #1E100A;
  --mid: #5C2E18;
  --gris: #8A7E78;
  --gris-l: #B5ACA6;
  --ok: #166534;
  --ok-bg: #dcfce7;
  --ok-border: #86efac;
  --warn: #854d0e;
  --warn-bg: #fef9c3;
  --warn-border: #fde047;
  --err: #dc2626;
  --err-bg: #fee2e2;
  --err-border: #fca5a5;
  --blue: #0369a1;
  --blue-bg: #e0f2fe;
  --surface: #fff;
  --r: 12px;
  --rl: 16px;
  --sh: 0 1px 3px rgba(30,16,10,.06), 0 4px 16px rgba(30,16,10,.08);
  --sh-lg: 0 4px 24px rgba(30,16,10,.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Outfit', 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
  background: var(--cream);
  color: var(--dark);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-thumb { background: var(--cd); border-radius: 9px; }

/* ── HEADER ── */
header {
  background: var(--dark);
  padding: 0 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky;
  top: 0;
  z-index: 300;
  box-shadow: 0 2px 16px rgba(0,0,0,.3);
}
.h-left { display: flex; align-items: center; gap: 16px; }
.h-logo { height: 36px; object-fit: contain; }
.h-sep { width: 1px; height: 32px; background: rgba(255,255,255,.12); }
.h-title { color: #fff; font-size: 16px; font-weight: 800; letter-spacing: -.2px; }
.h-sub { color: rgba(255,255,255,.35); font-size: 10px; letter-spacing: .4px; margin-top: 1px; }
.h-right { display: flex; align-items: center; gap: 12px; }
.h-ts {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 8px;
  padding: 5px 12px;
  display: flex; flex-direction: column; align-items: flex-end; gap: 1px;
}
.h-ts-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: rgba(255,255,255,.28); }
.h-ts-val { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.55); }
.h-live {
  display: flex; align-items: center; gap: 6px;
  background: rgba(16,185,129,.1);
  border: 1px solid rgba(16,185,129,.22);
  border-radius: 99px;
  padding: 5px 13px;
  font-size: 9px; font-weight: 800; color: #10b981;
  letter-spacing: .6px; text-transform: uppercase;
}
.h-live .dot {
  width: 6px; height: 6px; border-radius: 50%; background: #10b981;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,.5); }
  50%       { box-shadow: 0 0 0 5px rgba(16,185,129,0); }
}
.h-back {
  display: flex; align-items: center; gap: 6px;
  color: rgba(255,255,255,.45); font-size: 11px; font-weight: 600;
  text-decoration: none; border: 1px solid rgba(255,255,255,.1);
  border-radius: 8px; padding: 5px 12px;
  transition: all .15s;
}
.h-back:hover { color: #fff; border-color: rgba(255,255,255,.25); }

/* ── CONTROLES ── */
.controls {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 40px;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
}
.ctrl-group { display: flex; align-items: center; gap: 8px; }
.ctrl-group label {
  font-size: 9px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .8px; color: var(--gris);
}
.controls select {
  font-family: 'Outfit', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
  border: 1.5px solid var(--border);
  border-radius: 8px; padding: 6px 14px;
  font-size: 12px; font-weight: 700;
  background: var(--cream); color: var(--dark);
  cursor: pointer; transition: .13s;
}
.controls select:focus { outline: none; border-color: var(--coral); }

/* ── TABS ── */
.tabs-wrap { padding: 20px 40px 0; overflow-x: auto; }
.tabs { display: flex; gap: 2px; }
.tab {
  font-family: 'Outfit', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
  padding: 9px 20px;
  border-radius: 10px 10px 0 0;
  border: 1.5px solid var(--border);
  border-bottom: none;
  background: var(--cm);
  cursor: pointer;
  font-size: 12px; font-weight: 700;
  white-space: nowrap; color: var(--gris);
  transition: background .15s, color .15s;
}
.tab:hover { background: var(--cd); color: var(--dark); }
.tab.active { background: var(--surface); color: var(--dark); }

/* ── CONTENT ── */
.content { padding: 0 40px 80px; }
.panel {
  display: none;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 0 var(--rl) var(--rl) var(--rl);
  padding: 28px 32px;
}
.panel.active { display: block; }

/* ── SECTION HEADERS ── */
.sec { margin-bottom: 28px; }
.sec-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.sec-hdr h3 {
  font-size: 9px; font-weight: 800; color: var(--gris);
  text-transform: uppercase; letter-spacing: 1.2px; white-space: nowrap;
}
.sec-hdr .line { flex: 1; height: 1px; background: var(--border); }

/* ── KPI BOXES ── */
.kpi-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; }
.kpi-box {
  flex: 1; min-width: 160px;
  border: 1.5px solid var(--border);
  border-radius: var(--rl);
  padding: 20px 24px 18px;
  background: var(--surface);
  position: relative; overflow: hidden;
  box-shadow: var(--sh);
  transition: box-shadow .18s;
}
.kpi-box:hover { box-shadow: var(--sh-lg); }
.kpi-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--kc, var(--coral));
  border-radius: var(--rl) var(--rl) 0 0;
}
.kpi-glow {
  position: absolute; bottom: -18px; right: -18px;
  width: 70px; height: 70px; border-radius: 50%;
  background: var(--kc, var(--coral)); opacity: .05;
  pointer-events: none;
}
.kpi-label {
  font-size: 9px; font-weight: 800; color: var(--gris);
  text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px;
}
.kpi-val {
  font-size: 28px; font-weight: 900; line-height: 1;
  color: var(--dark); margin-bottom: 4px;
  font-variant-numeric: tabular-nums;
}
.kpi-sub { font-size: 11px; color: var(--gris); font-weight: 600; }

/* ── BADGE ── */
.badge {
  display: inline-flex; align-items: center;
  padding: 2px 9px; border-radius: 99px;
  font-size: 10px; font-weight: 800;
}
.badge.green  { background: var(--ok-bg);   color: var(--ok);   border: 1px solid var(--ok-border); }
.badge.yellow { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn-border); }
.badge.red    { background: var(--err-bg);  color: var(--err);  border: 1px solid var(--err-border); }
.badge.blue   { background: var(--blue-bg); color: var(--blue); border: 1px solid #7dd3fc; }

/* ── SEMÁFORO GRID ── */
.semaforo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px; margin-bottom: 28px;
}
.pais-card {
  border: 1.5px solid var(--border);
  border-radius: var(--rl); padding: 20px 22px;
  background: var(--surface);
  position: relative; overflow: hidden;
  transition: box-shadow .18s, transform .18s;
  box-shadow: var(--sh);
}
.pais-card:hover { box-shadow: var(--sh-lg); transform: translateY(-1px); }
.pais-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--pc, var(--gris));
  border-radius: var(--rl) var(--rl) 0 0;
}
.pais-card .pc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.pais-card .nombre { font-weight: 800; font-size: 14px; }
.pais-card .cifras {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px 14px; font-size: 11px; color: var(--gris);
  margin-bottom: 14px;
}
.pais-card .cifras .cf-item { }
.pais-card .cifras .cf-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--gris-l); margin-bottom: 1px; }
.pais-card .cifras .cf-val { font-size: 14px; font-weight: 800; color: var(--dark); }
.pais-card .cifras .cf-val.coral { color: var(--coral-d); }
.pais-card .cifras .cf-val.green { color: var(--ok); }
.bar-track {
  height: 8px; border-radius: 99px;
  background: var(--cm); overflow: hidden;
}
.bar-fill {
  height: 100%; border-radius: 99px;
  transition: width .7s cubic-bezier(.4,0,.2,1);
}
.bar-meta { display: flex; justify-content: space-between; font-size: 10px; font-weight: 600; margin-top: 5px; color: var(--gris); }

/* ── BAR CHART ── */
.chart-wrap {
  background: var(--cream);
  border-radius: var(--rl);
  padding: 22px 24px;
  border: 1.5px solid var(--border);
}
.chart-title {
  font-size: 9px; font-weight: 800; color: var(--gris);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px;
}
.bar-chart { display: flex; flex-direction: column; gap: 18px; }
.bar-row { display: flex; align-items: flex-start; gap: 12px; }
.bar-row-label {
  width: 140px; flex-shrink: 0;
  font-size: 12px; font-weight: 700; color: var(--dark);
  text-align: right; padding-top: 4px;
  line-height: 1.3;
}
.bar-row-bars { flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; overflow: hidden; }
.bar-group { display: flex; align-items: center; gap: 8px; min-width: 0; width: 100%; }
.bar-group-bar {
  height: 11px; border-radius: 99px; min-width: 3px;
  flex-shrink: 0;
  /* Cap: never wider than 60% of the row so label always fits */
  max-width: 60%;
  transition: width .7s cubic-bezier(.4,0,.2,1);
  position: relative; cursor: default;
}
.bar-group-bar.b-real    { background: var(--coral); }
.bar-group-bar.b-obj     { background: #27ae60; }
.bar-group-bar.b-ant     { background: var(--cd); }
.bar-group-lbl { font-size: 11px; font-weight: 700; white-space: nowrap; color: var(--dark); flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; max-width: 38%; }
.bar-group-lbl.l-real { color: var(--coral-d); }
.bar-group-lbl.l-obj  { color: #166534; }
.bar-group-lbl.l-ant  { color: var(--gris); }

.chart-legend { display: flex; gap: 16px; margin-top: 16px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 700; color: var(--gris); }
.legend-dot { width: 12px; height: 8px; border-radius: 3px; flex-shrink: 0; }

/* ── DETAIL TABLE ── */
.table-wrap { overflow-x: auto; margin-top: 28px; border-radius: var(--r); box-shadow: var(--sh); }
.detail-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.detail-table thead th {
  background: var(--dark); color: #fff;
  padding: 11px 16px;
  text-align: right;
  font-weight: 800; font-size: 9px;
  text-transform: uppercase; letter-spacing: .6px;
  white-space: nowrap;
}
.detail-table thead th:first-child { text-align: left; border-radius: 8px 0 0 0; }
.detail-table thead th:last-child { border-radius: 0 8px 0 0; }
.detail-table tbody td {
  padding: 13px 16px;
  text-align: right;
  border-bottom: 1px solid var(--border);
  font-variant-numeric: tabular-nums;
}
.detail-table tbody td:first-child { text-align: left; }
.detail-table tbody tr:last-child td { border-bottom: none; }
.detail-table tbody tr:hover td { background: var(--cream); }
.detail-table tfoot td {
  padding: 13px 16px;
  text-align: right;
  background: var(--ok-bg);
  font-weight: 800; font-size: 13px;
  border-top: 2px solid var(--ok-border);
  font-variant-numeric: tabular-nums;
}
.detail-table tfoot td:first-child { text-align: left; border-radius: 0 0 0 8px; }
.detail-table tfoot td:last-child { border-radius: 0 0 8px 0; }

.chip {
  background: var(--coral-soft); color: var(--coral-d);
  border-radius: 99px; padding: 3px 12px;
  font-size: 11px; font-weight: 800;
  display: inline-block; white-space: nowrap;
}

/* ── TOOLTIP (JS) ── */
#tooltip {
  position: fixed;
  background: var(--dark); color: #fff;
  font-family: 'Outfit', sans-serif;
  font-size: 11px; font-weight: 700;
  padding: 6px 12px; border-radius: 8px;
  pointer-events: none; white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,.3);
  z-index: 9999; opacity: 0;
  transition: opacity .12s;
}
#tooltip::after {
  content: '';
  position: absolute;
  top: 100%; left: 50%; transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: var(--dark);
}
#tooltip.show { opacity: 1; }

/* ── RESPONSIVE ── */
@media (max-width: 720px) {
  header, .controls, .tabs-wrap, .content { padding-left: 16px; padding-right: 16px; }
  .panel { padding: 18px 16px; }
  .bar-row-label { width: 80px; font-size: 10px; }
  .h-right { display: none; }
  .kpi-box { min-width: 130px; }
}
</style>
</head>
<body>

<!-- TOOLTIP GLOBAL -->
<div id="tooltip"></div>

<!-- HEADER -->
<header>
  <div class="h-left">
    <img class="h-logo" src="02_Logo-Viajero_Vertical-Blanco.png" alt="Viajero"
      onerror="this.style.display='none';document.getElementById('logo-fb').style.display='block'"/>
    <span id="logo-fb" style="display:none;font-size:14px;font-weight:900;color:#fff;letter-spacing:.5px;">VIAJERO</span>
    <div class="h-sep"></div>
    <div>
      <div class="h-title">Dashboard Ventas Comercial</div>
      <div class="h-sub">Agencias &amp; Grupos · Viajero Hostels</div>
    </div>
  </div>
  <div class="h-right">
    <a class="h-back" href="https://jmedinavh.github.io/viajero-dashboard/index.html">← Hub</a>
    <div class="h-ts">
      <div class="h-ts-label">Actualizado</div>
      <div class="h-ts-val" id="updated">—</div>
    </div>
    <div class="h-live"><div class="dot"></div>Live</div>
  </div>
</header>

<!-- CONTROLES -->
<div class="controls">
  <div class="ctrl-group">
    <label>Mes</label>
    <select id="mesSel"></select>
  </div>
</div>

<!-- TABS + CONTENT -->
<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
<div class="content" id="content"></div>

<script>
/* ───────────────── CONFIG ───────────────── */
const DATA_URL = 'https://raw.githubusercontent.com/jmedinavh/dashboard-ventas/main/data/data.json';

let DATA = null;
let mesSel = null;

/* ───────────────── TOOLTIP ───────────────── */
const tip = document.getElementById('tooltip');
function showTip(e, text) {
  tip.textContent = text;
  tip.classList.add('show');
  moveTip(e);
}
function moveTip(e) {
  const x = e.clientX, y = e.clientY;
  tip.style.left = (x - tip.offsetWidth / 2) + 'px';
  tip.style.top  = (y - tip.offsetHeight - 14) + 'px';
}
function hideTip() { tip.classList.remove('show'); }

/* ───────────────── INIT ───────────────── */
async function init() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    DATA = await res.json();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div style="padding:40px;color:var(--err);font-weight:700;">⚠ Error cargando datos. Verifica la URL del JSON.</div>';
    return;
  }

  /* Meses disponibles */
  const mesesSet = new Set();
  Object.values(DATA.paises).forEach(p =>
    (p.meses || []).forEach(m => mesesSet.add(m))
  );
  const meses = [...mesesSet];
  mesSel = meses[meses.length - 1];

  const sel = document.getElementById('mesSel');
  meses.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m;
    sel.appendChild(o);
  });
  sel.value = mesSel;
  sel.addEventListener('change', e => { mesSel = e.target.value; renderAll(); });

  document.getElementById('updated').textContent =
    new Date(DATA.updated).toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' });

  buildTabs();
  renderAll();
}

/* ───────────────── TABS ───────────────── */
function buildTabs() {
  const tabsEl  = document.getElementById('tabs');
  const contEl  = document.getElementById('content');

  addTab(tabsEl, contEl, 'cadena', '🌎 Cadena');
  Object.keys(DATA.paises).forEach(key => {
    const p = DATA.paises[key];
    addTab(tabsEl, contEl, key, `${p.emoji} ${p.nombre}`);
  });

  tabsEl.querySelector('.tab').classList.add('active');
  contEl.querySelector('.panel').classList.add('active');

  tabsEl.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      tabsEl.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      contEl.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('panel-' + t.dataset.tab).classList.add('active');
    });
  });
}

function addTab(tabsEl, contEl, key, label) {
  const t = document.createElement('div');
  t.className = 'tab'; t.dataset.tab = key; t.textContent = label;
  tabsEl.appendChild(t);
  const p = document.createElement('div');
  p.className = 'panel'; p.id = 'panel-' + key;
  contEl.appendChild(p);
}

/* ───────────────── HELPERS ───────────────── */
function fmt(n) {
  if (n == null) return '—';
  return '$' + Number(n).toLocaleString('es-CO', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function pct(n) {
  if (n == null) return '—';
  return (n >= 0 ? '+' : '') + (n * 100).toFixed(1) + '%';
}
function badgeHtml(v) {
  if (v == null) return '<span class="badge blue">Nuevo</span>';
  const p = (v * 100).toFixed(0) + '%';
  if (v >= 0.9) return `<span class="badge green">${p}</span>`;
  if (v >= 0.5) return `<span class="badge yellow">${p}</span>`;
  return `<span class="badge red">${p}</span>`;
}
function colorFor(v) {
  if (v == null) return '#2980b9';
  if (v >= 0.9)  return '#27ae60';
  if (v >= 0.5)  return '#f1c40f';
  return '#e74c3c';
}
function getMes(hostalMeses) {
  if (!hostalMeses) return null;
  if (hostalMeses[mesSel]) return hostalMeses[mesSel];
  const keys = Object.keys(hostalMeses);
  return hostalMeses[keys[keys.length - 1]];
}

/* ───────────────── BAR CHART HTML ───────────────── */
function buildBarChart(rows, titleText) {
  /* rows: [{label, real, objetivo, anterior}] */
  const maxVal = Math.max(
    ...rows.flatMap(r => [r.real || 0, r.objetivo || 0, r.anterior || 0]),
    1
  );
  const w = v => Math.min(Math.max(Math.round((v / maxVal) * 100), 1), 100);

  let html = `<div class="chart-wrap">
    <div class="chart-title">${titleText}</div>
    <div class="bar-chart">`;

  rows.forEach(r => {
    html += `<div class="bar-row">
      <div class="bar-row-label">${r.label}</div>
      <div class="bar-row-bars">
        <div class="bar-group">
          <div class="bar-group-bar b-real" style="width:${w(r.real)}%"
            data-tip="Real: ${fmt(r.real)}"></div>
          <span class="bar-group-lbl l-real">${fmt(r.real)}</span>
        </div>
        <div class="bar-group">
          <div class="bar-group-bar b-obj" style="width:${w(r.objetivo)}%"
            data-tip="Objetivo: ${fmt(r.objetivo)}"></div>
          <span class="bar-group-lbl l-obj">${fmt(r.objetivo)}</span>
        </div>
        <div class="bar-group">
          <div class="bar-group-bar b-ant" style="width:${w(r.anterior)}%"
            data-tip="Año ant.: ${fmt(r.anterior)}"></div>
          <span class="bar-group-lbl l-ant">${fmt(r.anterior)}</span>
        </div>
      </div>
    </div>`;
  });

  html += `</div>
    <div class="chart-legend">
      <span class="legend-item"><span class="legend-dot" style="background:var(--coral)"></span>Real</span>
      <span class="legend-item"><span class="legend-dot" style="background:#27ae60"></span>Objetivo</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--cd)"></span>Año anterior</span>
    </div>
  </div>`;
  return html;
}

/* ───────────────── RENDER CADENA ───────────────── */
function renderCadena() {
  const el = document.getElementById('panel-cadena');
  const c  = DATA.cadena;

  /* KPIs */
  let html = `
  <div class="sec">
    <div class="sec-hdr"><h3>Resumen de cadena</h3><div class="line"></div></div>
    <div class="kpi-row">
      <div class="kpi-box" style="--kc:var(--coral)">
        <div class="kpi-glow"></div>
        <div class="kpi-label">Real ${mesSel}</div>
        <div class="kpi-val">${fmt(c.real)}</div>
        <div class="kpi-sub">USD total cadena</div>
      </div>
      <div class="kpi-box" style="--kc:#27ae60">
        <div class="kpi-glow"></div>
        <div class="kpi-label">Objetivo</div>
        <div class="kpi-val">${fmt(c.objetivo)}</div>
        <div class="kpi-sub">${badgeHtml(c.varObj)} cumplimiento</div>
      </div>
      <div class="kpi-box" style="--kc:var(--blue)">
        <div class="kpi-glow"></div>
        <div class="kpi-label">Año anterior</div>
        <div class="kpi-val">${fmt(c.anterior)}</div>
        <div class="kpi-sub">YoY ${pct(c.varYoY)}</div>
      </div>
    </div>
  </div>`;

  /* Semáforo países */
  html += `<div class="sec">
    <div class="sec-hdr"><h3>Estado por país</h3><div class="line"></div></div>
    <div class="semaforo-grid">`;

  Object.entries(DATA.paises).forEach(([key, p]) => {
    const t = p.total;
    if (!t) return;
    const fillPct = t.varObj != null ? Math.min(t.varObj * 100, 100) : 0;
    html += `
    <div class="pais-card" style="--pc:${colorFor(t.varObj)}">
      <div class="pc-header">
        <div class="nombre">${p.emoji} ${p.nombre}</div>
        ${badgeHtml(t.varObj)}
      </div>
      <div class="cifras">
        <div class="cf-item">
          <div class="cf-label">Real</div>
          <div class="cf-val coral">${fmt(t.real)}</div>
        </div>
        <div class="cf-item">
          <div class="cf-label">Objetivo</div>
          <div class="cf-val">${fmt(t.objetivo)}</div>
        </div>
        <div class="cf-item">
          <div class="cf-label">Año anterior</div>
          <div class="cf-val">${fmt(t.anterior)}</div>
        </div>
        <div class="cf-item">
          <div class="cf-label">YoY</div>
          <div class="cf-val ${t.varYoY >= 0 ? 'green' : ''}" style="${t.varYoY < 0 ? 'color:var(--err)' : ''}">${pct(t.varYoY)}</div>
        </div>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${fillPct}%;background:${colorFor(t.varObj)}"></div>
      </div>
      <div class="bar-meta">
        <span>${t.varObj != null ? (t.varObj * 100).toFixed(1) + '% del objetivo' : 'Sin base anterior'}</span>
      </div>
    </div>`;
  });

  html += `</div></div>`;

  /* Gráfico barras cadena */
  const rows = Object.entries(DATA.paises)
    .filter(([,p]) => p.total)
    .map(([,p]) => ({
      label:    p.emoji + ' ' + p.nombre,
      real:     p.total.real,
      objetivo: p.total.objetivo,
      anterior: p.total.anterior,
    }));

  html += `<div class="sec">
    <div class="sec-hdr"><h3>Real vs Objetivo vs Año anterior (${mesSel})</h3><div class="line"></div></div>
    ${buildBarChart(rows, 'Comparativo por país — ' + mesSel)}
  </div>`;

  el.innerHTML = html;
  bindBarTooltips(el);
}

/* ───────────────── RENDER PAÍS ───────────────── */
function renderPais(key) {
  const el = document.getElementById('panel-' + key);
  if (!el) return;
  const p = DATA.paises[key];
  if (!p || !p.hostales) { el.innerHTML = '<p style="color:var(--gris);padding:20px;">Sin datos para este período.</p>'; return; }

  const t = p.total;

  /* KPIs país */
  let html = `<div class="sec">
    <div class="sec-hdr"><h3>Resumen ${p.nombre}</h3><div class="line"></div></div>
    <div class="kpi-row">
      <div class="kpi-box" style="--kc:var(--coral)">
        <div class="kpi-glow"></div>
        <div class="kpi-label">Real ${mesSel}</div>
        <div class="kpi-val">${fmt(t?.real)}</div>
        <div class="kpi-sub">USD</div>
      </div>
      <div class="kpi-box" style="--kc:#27ae60">
        <div class="kpi-glow"></div>
        <div class="kpi-label">Objetivo</div>
        <div class="kpi-val">${fmt(t?.objetivo)}</div>
        <div class="kpi-sub">${badgeHtml(t?.varObj)} cumplimiento</div>
      </div>
      <div class="kpi-box" style="--kc:var(--blue)">
        <div class="kpi-glow"></div>
        <div class="kpi-label">YoY</div>
        <div class="kpi-val" style="color:${t?.varYoY >= 0 ? 'var(--ok)' : 'var(--err)'}">${pct(t?.varYoY)}</div>
        <div class="kpi-sub">vs año anterior</div>
      </div>
    </div>
  </div>`;

  /* Gráfico barras por hostal */
  const rows = p.hostales.map(h => {
    const m = getMes(h.meses);
    return { label: h.nombre_completo, real: m?.real || 0, objetivo: m?.objetivo || 0, anterior: m?.anterior || 0 };
  });

  html += `<div class="sec">
    <div class="sec-hdr"><h3>Comparativo por hostal — ${mesSel}</h3><div class="line"></div></div>
    ${buildBarChart(rows, 'Real vs Objetivo vs Año anterior')}
  </div>`;

  /* Tabla detalle */
  html += `<div class="sec">
    <div class="sec-hdr"><h3>Detalle por hostal</h3><div class="line"></div></div>
    <div class="table-wrap">
    <table class="detail-table">
    <thead><tr>
      <th>Hostal</th>
      <th>Real (USD)</th>
      <th>Año ant.</th>
      <th>Objetivo</th>
      <th>Var YoY</th>
      <th>Cumplimiento</th>
    </tr></thead>
    <tbody>`;

  p.hostales.forEach(h => {
    const m = getMes(h.meses);
    if (!m) return;
    const fillPct = m.varObj != null ? Math.min(m.varObj * 100, 100) : 0;
    html += `<tr>
      <td><span class="chip">${h.nombre_completo}</span></td>
      <td>${fmt(m.real)}</td>
      <td>${fmt(m.anterior)}</td>
      <td>${fmt(m.objetivo)}</td>
      <td style="font-weight:700;color:${m.varYoY == null ? 'var(--gris)' : m.varYoY >= 0 ? 'var(--ok)' : 'var(--err)'}">${pct(m.varYoY)}</td>
      <td>
        ${badgeHtml(m.varObj)}
        <div style="margin-top:6px">
          <div class="bar-track" style="width:90px">
            <div class="bar-fill" style="width:${fillPct}%;background:${colorFor(m.varObj)}"></div>
          </div>
        </div>
      </td>
    </tr>`;
  });

  html += `</tbody>
  <tfoot><tr>
    <td>TOTAL ${p.nombre.toUpperCase()}</td>
    <td>${fmt(t?.real)}</td>
    <td>${fmt(t?.anterior)}</td>
    <td>${fmt(t?.objetivo)}</td>
    <td style="color:${t?.varYoY >= 0 ? 'var(--ok)' : 'var(--err)'}">${pct(t?.varYoY)}</td>
    <td>${badgeHtml(t?.varObj)}</td>
  </tr></tfoot>
  </table></div></div>`;

  el.innerHTML = html;
  bindBarTooltips(el);
}

/* ───────────────── BIND TOOLTIPS ───────────────── */
function bindBarTooltips(container) {
  container.querySelectorAll('[data-tip]').forEach(bar => {
    bar.addEventListener('mouseenter', e => showTip(e, bar.dataset.tip));
    bar.addEventListener('mousemove',  e => moveTip(e));
    bar.addEventListener('mouseleave', hideTip);
  });
}

/* ───────────────── RENDER ALL ───────────────── */
function renderAll() {
  renderCadena();
  Object.keys(DATA.paises).forEach(key => renderPais(key));
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
