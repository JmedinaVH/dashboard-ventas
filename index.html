<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Ventas · Comercial — Viajero Hostels</title>
<link rel="icon" type="image/png" href="favicon-32x32.png"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --coral:#F04B24; --coral-d:#C93A18; --coral-soft:#FEF0EC;
  --cream:#F4EFE9; --cm:#EDE5DA; --cd:#E0D5C8; --border:#DDD4CA;
  --dark:#1E100A; --mid:#6B3A28; --gris:#7A6E68;
  --ok:#15803d; --ok-bg:#dcfce7;
  --warn:#854d0e; --warn-bg:#fef9c3;
  --err:#dc2626; --err-bg:#fee2e2;
  --blue:#0369a1; --blue-bg:#e0f2fe;
  --surface:#fff;
  --r:12px; --rl:16px;
  --sh:0 2px 8px rgba(30,16,10,.06),0 4px 20px rgba(30,16,10,.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--dark);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--cd);border-radius:9px;}

/* HEADER */
header{background:var(--dark);padding:0 36px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.h-left{display:flex;align-items:center;gap:14px;}
.h-logo{height:34px;object-fit:contain;}
.h-sep{width:1px;height:28px;background:rgba(255,255,255,.15);}
.h-title{color:#fff;font-size:16px;font-weight:700;}
.h-sub{color:rgba(255,255,255,.38);font-size:10px;letter-spacing:.4px;margin-top:1px;}
.h-right{display:flex;align-items:center;gap:10px;}
.h-ts{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:4px 10px;display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.h-ts-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.3);}
.h-ts-val{font-size:11px;color:rgba(255,255,255,.6);}
.h-live{display:flex;align-items:center;gap:5px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);border-radius:99px;padding:4px 11px;font-size:9px;font-weight:700;color:#10b981;letter-spacing:.5px;text-transform:uppercase;}
.h-live .dot{width:5px;height:5px;border-radius:50%;background:#10b981;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5);}50%{box-shadow:0 0 0 4px rgba(16,185,129,0);}}

/* BANNER KPI */
.banner{background:var(--dark);border-radius:var(--rl);padding:22px 28px;margin:24px 36px 0;display:flex;align-items:center;gap:24px;position:relative;overflow:hidden;}
.banner::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;border-radius:50%;background:var(--coral);opacity:.06;pointer-events:none;}
.banner-left{flex:1;}
.banner-title{font-size:18px;font-weight:800;color:#fff;margin-bottom:4px;}
.banner-sub{font-size:11px;color:rgba(255,255,255,.38);letter-spacing:.3px;}
.banner-kpis{display:flex;gap:20px;flex-wrap:wrap;}
.bkpi{text-align:right;flex-shrink:0;}
.bkpi-val{font-size:36px;font-weight:800;line-height:1;}
.bkpi-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.35);margin-top:2px;}
.bkpi-sep{width:1px;height:44px;background:rgba(255,255,255,.1);align-self:center;}

/* CONTROLES */
.controls{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 36px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.controls label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--gris);}
.controls select{font-family:'Outfit',sans-serif;border:1.5px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;background:var(--cream);color:var(--dark);cursor:pointer;transition:.13s;}
.controls select:focus{outline:none;border-color:var(--coral);}

/* TABS */
.tabs{display:flex;gap:2px;padding:16px 36px 0;overflow-x:auto;}
.tab{font-family:'Outfit',sans-serif;padding:8px 18px;border-radius:8px 8px 0 0;border:1.5px solid var(--border);border-bottom:none;background:var(--cm);cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;transition:background .15s;color:var(--gris);}
.tab.active{background:var(--surface);color:var(--dark);}
.content{padding:0 36px 60px;}
.panel{display:none;background:var(--surface);border:1.5px solid var(--border);border-radius:0 var(--rl) var(--rl) var(--rl);padding:24px;}
.panel.active{display:block;}

/* SEC */
.sec{margin-bottom:24px;}
.sec-hdr{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
.sec-hdr h3{font-size:10px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
.sec-hdr .linea{flex:1;height:1px;background:var(--border);}

/* KPI BOXES */
.cadena-kpi{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:22px;}
.kpi-box{border:1.5px solid var(--border);border-radius:var(--r);padding:16px 22px;background:var(--surface);min-width:150px;position:relative;overflow:hidden;}
.kpi-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,var(--coral));border-radius:var(--r) var(--r) 0 0;}
.kpi-glow{position:absolute;bottom:-14px;right:-14px;width:54px;height:54px;border-radius:50%;background:var(--kc,var(--coral));opacity:.06;}
.kpi-label{font-size:9px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.kpi-val{font-size:24px;font-weight:800;line-height:1;color:var(--kc,var(--dark));margin-bottom:2px;}
.kpi-sub{font-size:11px;color:var(--gris);}

/* SEMAFORO */
.semaforo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:24px;}
.pais-card{border:1.5px solid var(--border);border-radius:var(--rl);padding:16px 18px;background:var(--surface);position:relative;overflow:hidden;transition:box-shadow .18s;}
.pais-card:hover{box-shadow:var(--sh);}
.pais-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--pc,var(--gris));border-radius:var(--rl) var(--rl) 0 0;}
.pais-card .nombre{font-weight:700;font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.pais-card .cifras{display:flex;gap:10px;font-size:11px;color:var(--gris);margin-bottom:10px;flex-wrap:wrap;}
.pais-card .cifras span b{color:var(--dark);font-weight:700;}
.bar-track{height:8px;border-radius:99px;background:var(--cd);overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.bar-label{font-size:10px;margin-top:4px;color:var(--gris);}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;margin-left:4px;}
.badge.green{background:var(--ok-bg);color:var(--ok);}
.badge.yellow{background:var(--warn-bg);color:var(--warn);}
.badge.red{background:var(--err-bg);color:var(--err);}
.badge.blue{background:var(--blue-bg);color:var(--blue);}

/* BAR CHART */
.chart-section{margin-top:24px;background:var(--cream);border-radius:var(--r);padding:18px 20px;}
.chart-section h3{font-size:9px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px;}
.bar-chart{display:flex;flex-direction:column;gap:12px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-row .label{width:130px;font-size:11px;font-weight:600;text-align:right;color:var(--dark);flex-shrink:0;}
.bar-row .bars{flex:1;display:flex;flex-direction:column;gap:4px;}
.bar-wrap{position:relative;display:flex;align-items:center;gap:7px;}
.bar-wrap .bar{height:10px;border-radius:99px;min-width:2px;transition:width .6s cubic-bezier(.4,0,.2,1);cursor:pointer;position:relative;flex-shrink:0;}
.bar-wrap .bar-lbl{font-size:10px;font-weight:700;color:var(--dark);white-space:nowrap;}
.bar-real{background:var(--coral);}
.bar-obj{background:#27ae60;}
.bar-ant{background:var(--cd);}
/* TOOLTIP */
.bar-wrap .bar::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;font-size:10px;font-weight:600;font-family:'Outfit',sans-serif;padding:4px 9px;border-radius:7px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .16s;z-index:99;}
.bar-wrap .bar::before{content:'';position:absolute;bottom:calc(100% + 1px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--dark);pointer-events:none;opacity:0;transition:opacity .16s;z-index:99;}
.bar-wrap .bar:hover::after,.bar-wrap .bar:hover::before{opacity:1;}
.legend{display:flex;gap:14px;margin-top:12px;font-size:10px;font-weight:600;color:var(--gris);}
.legend span{display:flex;align-items:center;gap:5px;}
.legend-dot{display:inline-block;width:10px;height:10px;border-radius:3px;}

/* DETAIL TABLE */
.detail-table{width:100%;border-collapse:collapse;margin-top:16px;font-size:12px;}
.detail-table th{background:var(--dark);color:#fff;padding:9px 12px;text-align:right;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.5px;}
.detail-table th:first-child{text-align:left;border-radius:8px 0 0 0;}
.detail-table th:last-child{border-radius:0 8px 0 0;}
.detail-table td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--border);}
.detail-table td:first-child{text-align:left;}
.detail-table tr:hover td{background:var(--cream);}
.detail-table tr.total td{background:var(--ok-bg);font-weight:700;border-top:2px solid #27ae60;}
.detail-table tr.total td:first-child{border-radius:0 0 0 8px;}
.detail-table tr.total td:last-child{border-radius:0 0 8px 0;}
.chip{background:var(--coral-soft);color:var(--coral-d);border-radius:99px;padding:3px 11px;font-size:11px;font-weight:700;display:inline-block;}

@media(max-width:700px){
  header,.controls,.tabs,.content{padding-left:16px;padding-right:16px;}
  .banner{margin:16px;}
  .bar-row .label{width:80px;font-size:10px;}
  .h-right{display:none;}
}
</style>
</head>
<body>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/jmedinavh/dashboard-ventas/main/data/data.json';

let DATA = null;
let mesSel = null;

async function init() {
  const res = await fetch(DATA_URL + '?t=' + Date.now());
  DATA = await res.json();

  // Detectar meses disponibles (union de todos los países)
  const mesesSet = new Set();
  Object.values(DATA.paises).forEach(p => (p.meses || []).forEach(m => mesesSet.add(m)));
  const meses = [...mesesSet];
  mesSel = meses[meses.length - 1];

  // Selector de mes
  const sel = document.getElementById('mesSel');
  meses.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m;
    sel.appendChild(o);
  });
  sel.value = mesSel;
  sel.addEventListener('change', e => { mesSel = e.target.value; renderAll(); });

  // Fecha actualización
  document.getElementById('updated').textContent =
    'Actualizado: ' + new Date(DATA.updated).toLocaleDateString('es-CO', { day:'2-digit', month:'short', year:'numeric' });

  buildTabs();
  renderAll();
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  const contentEl = document.getElementById('content');

  // Tab Cadena
  addTab(tabsEl, contentEl, 'cadena', '🌎 Cadena');
  // Tabs por país
  Object.keys(DATA.paises).forEach(key => {
    const p = DATA.paises[key];
    addTab(tabsEl, contentEl, key, `${p.emoji} ${p.nombre}`);
  });

  document.querySelector('.tab').classList.add('active');
  document.querySelector('.panel').classList.add('active');

  tabsEl.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      tabsEl.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      contentEl.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('panel-' + t.dataset.tab).classList.add('active');
    });
  });
}

function addTab(tabsEl, contentEl, key, label) {
  const t = document.createElement('div');
  t.className = 'tab'; t.dataset.tab = key; t.textContent = label;
  tabsEl.appendChild(t);
  const p = document.createElement('div');
  p.className = 'panel'; p.id = 'panel-' + key;
  contentEl.appendChild(p);
}

function renderAll() {
  renderCadena();
  Object.keys(DATA.paises).forEach(key => renderPais(key));
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  return '$' + Number(n).toLocaleString('es-CO', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function pct(n) {
  if (n === null || n === undefined) return '—';
  return (n >= 0 ? '+' : '') + (n * 100).toFixed(1) + '%';
}
function badge(varObj) {
  if (varObj === null) return '<span class="badge blue">Nuevo</span>';
  if (varObj >= 0.9)   return `<span class="badge green">${(varObj*100).toFixed(0)}%</span>`;
  if (varObj >= 0.5)   return `<span class="badge yellow">${(varObj*100).toFixed(0)}%</span>`;
  return `<span class="badge red">${(varObj*100).toFixed(0)}%</span>`;
}
function color(varObj) {
  if (varObj === null) return '#2980b9';
  if (varObj >= 0.9)  return '#27ae60';
  if (varObj >= 0.5)  return '#f1c40f';
  return '#e74c3c';
}

function getMes(paisData, hostalMeses) {
  // Busca el mes seleccionado o el último disponible
  if (hostalMeses && hostalMeses[mesSel]) return hostalMeses[mesSel];
  if (hostalMeses) {
    const keys = Object.keys(hostalMeses);
    return hostalMeses[keys[keys.length - 1]];
  }
  return null;
}

function renderCadena() {
  const el = document.getElementById('panel-cadena');
  const c = DATA.cadena;
  const maxReal = Math.max(...Object.values(DATA.paises).map(p => {
    const m = getMes(p, p.hostales ? Object.fromEntries(Object.entries(
      p.hostales.reduce((acc, h) => {
        Object.keys(h.meses).forEach(k => { if (!acc[k]) acc[k]={real:0,anterior:0,objetivo:0}; acc[k].real+=h.meses[k].real; acc[k].anterior+=h.meses[k].anterior; acc[k].objetivo+=h.meses[k].objetivo; }); return acc;
      }, {})
    )) : null);
    return p.total ? p.total.real : 0;
  }));

  let html = `
  <div class="cadena-kpi">
    <div class="kpi-box"><div class="kpi-label">Real ${mesSel}</div><div class="kpi-val">${fmt(c.real)}</div><div class="kpi-sub">USD</div></div>
    <div class="kpi-box"><div class="kpi-label">Objetivo</div><div class="kpi-val">${fmt(c.objetivo)}</div><div class="kpi-sub">${badge(c.varObj).replace(/>/g,'>').replace(/</g,'<')}</div></div>
    <div class="kpi-box"><div class="kpi-label">Año anterior</div><div class="kpi-val">${fmt(c.anterior)}</div><div class="kpi-sub">YoY ${pct(c.varYoY)}</div></div>
  </div>
  <div class="semaforo-grid">`;

  Object.entries(DATA.paises).forEach(([key, p]) => {
    const t = p.total;
    if (!t) return;
    const pct_obj = t.varObj !== null ? Math.min(t.varObj * 100, 100) : 0;
    html += `
    <div class="pais-card">
      <div class="nombre">${p.emoji} ${p.nombre} ${badge(t.varObj)}</div>
      <div class="cifras">
        <span>Real: <b>${fmt(t.real)}</b></span>
        <span>Obj: <b>${fmt(t.objetivo)}</b></span>
        <span>YoY: <b>${pct(t.varYoY)}</b></span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct_obj}%;background:${color(t.varObj)}"></div></div>
      <div class="bar-label">${t.varObj !== null ? (t.varObj*100).toFixed(1)+'% del objetivo' : 'Sin base anterior'}</div>
    </div>`;
  });

  html += `</div><div class="chart-section"><h3>Real vs Objetivo vs Año anterior (${mesSel})</h3><div class="bar-chart">`;

  const maxBar = Math.max(...Object.values(DATA.paises).map(p => Math.max(p.total?.real||0, p.total?.objetivo||0, p.total?.anterior||0)), 1);
  Object.entries(DATA.paises).forEach(([key, p]) => {
    const t = p.total;
    if (!t) return;
    const w = v => Math.round((v / maxBar) * 100);
    html += `
    <div class="bar-row">
      <div class="label">${p.emoji} ${p.nombre}</div>
      <div class="bars">
        <div class="bar-wrap"><div class="bar bar-real" style="width:${w(t.real)}%" data-tip="Real: ${fmt(t.real)}"></div><span class="bar-lbl" style="color:var(--coral-d)">${fmt(t.real)}</span></div>
        <div class="bar-wrap"><div class="bar bar-obj" style="width:${w(t.objetivo)}%" data-tip="Objetivo: ${fmt(t.objetivo)}"></div><span class="bar-lbl" style="color:#166534">${fmt(t.objetivo)}</span></div>
        <div class="bar-wrap"><div class="bar bar-ant" style="width:${w(t.anterior)}%" data-tip="Año ant.: ${fmt(t.anterior)}"></div><span class="bar-lbl" style="color:var(--gris)">${fmt(t.anterior)}</span></div>
    </div>`;
  });

  html += `</div>
  <div style="margin-top:12px;display:flex;gap:16px;font-size:0.8rem;">
    <span><span style="display:inline-block;width:14px;height:10px;background:#2980b9;border-radius:2px;margin-right:4px;"></span>Real</span>
    <span><span style="display:inline-block;width:14px;height:10px;background:#27ae60;border-radius:2px;margin-right:4px;"></span>Objetivo</span>
    <span><span style="display:inline-block;width:14px;height:10px;background:#bbb;border-radius:2px;margin-right:4px;"></span>Año anterior</span>
  </div>
  </div>`;

  el.innerHTML = html;
}

function renderPais(key) {
  const el = document.getElementById('panel-' + key);
  if (!el) return;
  const p = DATA.paises[key];
  if (!p || !p.hostales) { el.innerHTML = '<p style="color:var(--muted)">Sin datos</p>'; return; }

  const t = p.total;
  const maxBar = Math.max(...p.hostales.map(h => { const m = getMes(p, h.meses); return m ? Math.max(m.real, m.objetivo, m.anterior) : 0; }), 1);

  let html = `
  <div class="cadena-kpi">
    <div class="kpi-box"><div class="kpi-label">Real ${mesSel}</div><div class="kpi-val">${fmt(t?.real)}</div></div>
    <div class="kpi-box"><div class="kpi-label">Objetivo</div><div class="kpi-val">${fmt(t?.objetivo)}</div><div class="kpi-sub">${badge(t?.varObj)}</div></div>
    <div class="kpi-box"><div class="kpi-label">YoY</div><div class="kpi-val" style="color:${t?.varYoY>=0?'var(--green)':'var(--red)'}">${pct(t?.varYoY)}</div></div>
  </div>
  <table class="detail-table">
  <thead><tr>
    <th>Hostal</th>
    <th>Real (USD)</th>
    <th>Año Ant.</th>
    <th>Objetivo</th>
    <th>Var YoY</th>
    <th>Cumplimiento</th>
  </tr></thead><tbody>`;

  p.hostales.forEach(h => {
    const m = getMes(p, h.meses);
    if (!m) return;
    const w = v => Math.round((v / maxBar) * 60);
    html += `<tr>
      <td><span class="chip">${h.nombre_completo}</span></td>
      <td>${fmt(m.real)}</td>
      <td>${fmt(m.anterior)}</td>
      <td>${fmt(m.objetivo)}</td>
      <td style="color:${m.varYoY===null?'var(--muted)':m.varYoY>=0?'var(--green)':'var(--red)'}">${pct(m.varYoY)}</td>
      <td>${badge(m.varObj)}
        <div style="margin-top:4px"><div class="bar-track" style="width:80px"><div class="bar-fill" style="width:${m.varObj!==null?Math.min(m.varObj*100,100):0}%;background:${color(m.varObj)}"></div></div></div>
      </td>
    </tr>`;
  });

  html += `
  </tbody>
  <tfoot><tr class="total">
    <td>TOTAL ${p.nombre.toUpperCase()}</td>
    <td>${fmt(t?.real)}</td>
    <td>${fmt(t?.anterior)}</td>
    <td>${fmt(t?.objetivo)}</td>
    <td style="color:${t?.varYoY>=0?'var(--green)':'var(--red)'}">${pct(t?.varYoY)}</td>
    <td>${badge(t?.varObj)}</td>
  </tr></tfoot>
  </table>`;

  el.innerHTML = html;
}

window.addEventListener('DOMContentLoaded', init);
</script>

<header>
  <div class="h-left">
    <img class="h-logo" src="02_Logo-Viajero_Vertical-Blanco.png" alt="Viajero"
      onerror="this.style.display='none';document.getElementById('logo-fb').style.display='block'"/>
    <span id="logo-fb" style="display:none;font-size:13px;font-weight:800;color:#fff;letter-spacing:.5px;">VIAJERO</span>
    <div class="h-sep"></div>
    <div>
      <div class="h-title">Dashboard Ventas Comercial</div>
      <div class="h-sub">Agencias & Grupos · Viajero Hostels</div>
    </div>
  </div>
